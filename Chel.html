<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأبطال ⚔️</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #9d50bb;
            --dark: #060918; 
            --accent: #00ff88; 
            --card: rgba(255, 255, 255, 0.05); 
            --wa-bg: #0b141a;
            --wa-sent: #005c4b; 
            --wa-received: #202c33;
            --danger: #ff4757;
            --neon-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        
        body { 
            background: var(--dark); 
            background-image: radial-gradient(circle at top right, #1a1b3a, transparent), radial-gradient(circle at bottom left, #0d0e25, transparent);
            color: #fff; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
            min-height: 100vh;
        }

        /* تحسين الكروت */
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            box-shadow: var(--neon-shadow);
        }

        /* الأزرار الرئيسية */
        .main-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            padding: 16px; border-radius: 16px; color: white; 
            width: 100%; font-weight: 800; display: flex; 
            align-items: center; justify-content: center; gap: 12px; 
            border: none; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .main-btn:active { transform: scale(0.98); }

        /* الأيقونات بجانب الشات */
        .action-group { display: flex; gap: 10px; align-items: center; }
        
        .chat-icon-btn, .challenge-icon-btn {
            position: relative; width: 45px; height: 45px; 
            border-radius: 14px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-icon-btn { background: rgba(255,255,255,0.1); color: var(--primary); }
        .challenge-icon-btn { background: rgba(255, 71, 87, 0.2); color: var(--danger); border-color: var(--danger); }
        .challenge-icon-btn:hover { background: var(--danger); color: white; }

        .notif-dot { 
            position: absolute; top: -5px; right: -5px; width: 14px; height: 14px; 
            background: var(--danger); border-radius: 50%; border: 2.5px solid var(--dark); 
            box-shadow: 0 0 10px var(--danger); animation: pulse-dot 1.2s infinite;
        }

        @keyframes pulse-dot { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input { 
            width: 100%; padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; 
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* واجهة الشات */
        #chatPage { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: rgba(255,255,255,0.03); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; position: relative; line-height: 1.4; }
        .msg.sent { background: linear-gradient(135deg, var(--primary), #2980b9); align-self: flex-start; border-top-right-radius: 4px; }
        .msg.received { background: rgba(255,255,255,0.1); align-self: flex-end; border-top-left-radius: 4px; }

        .searching-text { text-align: center; color: var(--primary); padding: 20px; font-style: italic; }
        
        .new-messages-separator {
            text-align: center; color: var(--danger); font-size: 11px; font-weight: bold;
            margin: 15px 0; border-bottom: 1px solid rgba(255, 71, 87, 0.3); line-height: 0.1em;
        }
        .new-messages-separator span { background: var(--dark); padding: 0 10px; }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <div style="font-size: 50px; margin-bottom: 10px;">🏆</div>
            <h2 style="color:var(--primary); margin-top:0;">بوابة الأبطال</h2>
            <p style="font-size: 13px; color: #888; margin-bottom: 20px;">تأكد من رقمك جيداً، لا يمكن تعديله لاحقاً!</p>
            <input type="text" id="setupName" placeholder="الاسم المستعار">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف (01...)">
            <button onclick="confirmAndSave()" class="main-btn">تأكيد وانطلاق ⚡</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:50px 0;">
            <div style="font-size:32px; font-weight:900; background: linear-gradient(to left, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ساحة الأصدقاء ⚔️</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-weight: bold;"></div>
        </div>
        
        <button class="main-btn" onclick="showSection('friendsPage')">
            <div id="mainMenuDot" class="notif-dot" style="top: 10px; right: 10px; display:none;"></div>
            <i class="fas fa-users-rays"></i> قائمة الأصدقاء والتحدي
        </button>

        <button class="main-btn" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="showSection('selfChallengePage')">
            <i class="fas fa-bolt"></i> تدريب فردي
        </button>

        <button onclick="window.location.href='dash_boared.html'" style="background:none; border:1px solid #333; color:#666; margin-top:30px; width:100%; padding:12px; border-radius:12px; cursor:pointer;">
            <i class="fas fa-house"></i> العودة للمنصة
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; color: var(--primary);"><i class="fas fa-chevron-right"></i> عودة</div>
            <button class="main-btn" onclick="fetchFriendsData()" style="width:auto; padding:8px 15px; font-size:12px;">
                <i class="fas fa-sync" id="syncIcon"></i> تحديث
            </button>
        </div>
        
        <div class="card">
            <h4 style="margin-top:0;"><i class="fas fa-user-plus"></i> إضافة بطل جديد</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="رقم الهاتف" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--primary); padding:0 20px; border-radius:12px; border:none; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; text-align:center; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px;">
                <p id="foundName" style="color:var(--accent); font-weight:bold; margin-bottom:10px;"></p>
                <button id="requestBtn" onclick="sendFriendRequest()" class="main-btn" style="padding:10px;">إرسال طلب ➕</button>
            </div>
        </div>

        <div id="receivedList"></div>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <span id="chatFriendName" style="font-weight:bold; font-size:18px; flex:1;">...</span>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area" style="padding:15px; background:rgba(255,255,255,0.03); display:flex; gap:10px;">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." style="margin:0; flex:1;">
            <button onclick="sendChatMessage()" class="main-btn" style="width:50px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="selfChallengePage" class="sub-page">
        <div onclick="showSection('mainMenu')" style="margin-bottom:20px; cursor:pointer;"><i class="fas fa-chevron-right"></i> رجوع</div>
        <div class="card" onclick="startChallenge('challenge1')">🚀 تحدي سرعة الكتابة</div>
        <div class="card" onclick="startChallenge('challenge2')">🧠 تحدي الذاكرة</div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbxo66cbciY4-vFTyi8LG8lAtd0TvAyM0gcYUslNuuVjDnMR6RgUwOnq0e8dSGqexOb_/exec";
        
        let chatInterval = null;
        let globalSyncInterval = null;
        let lastMsgCount = 0;
        let isChatOpen = false;
        let knownChallenges = new Set(); // لتجنب تكرار تنبيه التحدي
        
        let msgMemory = JSON.parse(localStorage.getItem('msgMemory')) || {};
        let friendsCache = JSON.parse(localStorage.getItem('friendsCache')) || { friends: [], received: [] };

        // 1. تأكيد البيانات عند التسجيل
        function confirmAndSave() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'بيانات غير مكتملة', 'error');

            Swal.fire({
                title: 'تأكيد الرقم',
                text: `هل أنت متأكد أن رقمك هو: ${p}؟ لا يمكنك تغييره لاحقاً.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، متأكد',
                cancelButtonText: 'تعديل'
            }).then(res => {
                if(res.isConfirmed) {
                    localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
                    initApp();
                }
            });
        }

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                showSection(localStorage.getItem('lastPage') || 'mainMenu');
                document.getElementById('welcomeUser').innerText = `أهلاً بك يا ${user.name} 🔥`;
                startGlobalSync();
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        // 2. مزامنة الخلفية للكشف عن الرسائل والتحديات
        function startGlobalSync() {
            if(globalSyncInterval) clearInterval(globalSyncInterval);
            globalSyncInterval = setInterval(async () => {
                const user = JSON.parse(localStorage.getItem('appUser'));
                if(!user) return;
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                    const data = await res.json();
                    
                    let hasNewGlobal = false;
                    data.friends.forEach(f => {
                        const saved = msgMemory[f.phone] || 0;
                        if(f.msgCount > saved) {
                            hasNewGlobal = true;
                            // فحص التحديات
                            checkForChallenges(f.phone, f.name);
                        }
                        const dot = document.getElementById(`dot-${f.phone}`);
                        if(dot) dot.style.display = (f.msgCount > saved) ? 'block' : 'none';
                    });
                    
                    const dotMenu = document.getElementById('mainMenuDot');
                    if(dotMenu) dotMenu.style.display = (hasNewGlobal || data.received.length > 0) ? 'block' : 'none';
                } catch(e) {}
            }, 3000);
        }

        // 3. نظام التحدي (إرسال واستقبال)
        async function sendChallenge(friendPhone, friendName) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const challengeCode = `CHALLENGE_INVITE_${Date.now()}`;
            
            Swal.fire({ title: 'جاري الإرسال...', didOpen: () => Swal.showLoading() });
            
            try {
                const text = `⚔️ طلب تحدي مباشر! [CODE:${challengeCode}]`;
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${friendPhone}&text=${encodeURIComponent(text)}`);
                Swal.fire('تم الإرسال!', `في انتظار قبول ${friendName} للتحدي...`, 'success');
            } catch(e) { Swal.fire('خطأ', 'فشل إرسال التحدي', 'error'); }
        }

        async function checkForChallenges(fPhone, fName) {
            if (isChatOpen) return; // لا تظهر تنبيه التحدي إذا كنت داخل الشات (سيظهر كرسالة)
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${fPhone}`);
                const data = await res.json();
                const lastMsg = data.messages[data.messages.length - 1];

                if(lastMsg && lastMsg.text.includes('⚔️ طلب تحدي مباشر!') && lastMsg.sender != user.phone) {
                    const challengeId = lastMsg.text.split('CODE:')[1];
                    if(!knownChallenges.has(challengeId)) {
                        knownChallenges.add(challengeId);
                        
                        Swal.fire({
                            title: 'تحدي جديد! ⚔️',
                            text: `اللاعب ${fName} يتحداك الآن في مباراة مباشرة، هل تقبل؟`,
                            icon: 'info',
                            showCancelButton: true,
                            confirmButtonColor: '#00ff88',
                            cancelButtonColor: '#ff4757',
                            confirmButtonText: 'قبول التحدي ✅',
                            cancelButtonText: 'رفض التحدي ❌'
                        }).then(result => {
                            if(result.isConfirmed) {
                                openChat(fName, fPhone);
                                sendChatMessage(`✅ قبلت التحدي! أنا جاهز.`);
                            } else {
                                sendChatMessageSilently(fPhone, `❌ تم رفض التحدي.`);
                            }
                        });
                    }
                }
            } catch(e) {}
        }

        // 4. بناء قائمة الأصدقاء مع زر التحدي
        function renderFriends(data) {
            const list = document.getElementById('friendsList');
            const rec = document.getElementById('receivedList');

            rec.innerHTML = data.received.map(r => `
                <div class="card" style="border-color:var(--accent);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${r.name} يطلب صداقتك</b>
                        <button onclick="respond('${r.phone}', 'accept')" class="main-btn" style="width:auto; padding:8px 15px; background:var(--accent); color:black;">قبول</button>
                    </div>
                </div>
            `).join('');

            list.innerHTML = `<h4 style="margin-right:10px;">أصدقائي</h4>` + data.friends.map(f => {
                const hasNew = (f.msgCount || 0) > (msgMemory[f.phone] || 0);
                return `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:bold;">${f.name}</div>
                        <div style="font-size:10px; color:#666;">متصل الآن</div>
                    </div>
                    <div class="action-group">
                        <div class="challenge-icon-btn" onclick="sendChallenge('${f.phone}', '${f.name}')">
                            <i class="fas fa-swords"></i>
                        </div>
                        <div class="chat-icon-btn" onclick="openChat('${f.name}', '${f.phone}')">
                            <div id="dot-${f.phone}" class="notif-dot" style="${hasNew ? 'display:block' : 'none'}"></div>
                            <i class="fas fa-comment"></i>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // وظائف الشات والخدمات المساعدة (نفس المنطق السابق مع تحسين المظهر)
        async function openChat(name, phone) {
            isChatOpen = true;
            window.currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            document.getElementById('chatMsgs').innerHTML = '<div class="searching-text">جاري مزامنة الرسائل...</div>';
            loadMessages();
            chatInterval = setInterval(loadMessages, 2500);
        }

        async function loadMessages() {
            if(!isChatOpen) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${window.currentChatPhone}`);
                const data = await res.json();
                
                const container = document.getElementById('chatMsgs');
                let html = "";
                let saved = msgMemory[window.currentChatPhone] || 0;

                data.messages.forEach((m, i) => {
                    if(i === saved && i !== 0 && m.sender != user.phone) html += `<div class="new-messages-separator"><span>رسائل جديدة</span></div>`;
                    const isMe = m.sender == user.phone;
                    html += `<div class="msg ${isMe ? 'sent' : 'received'}">${m.text}</div>`;
                });

                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
                
                msgMemory[window.currentChatPhone] = data.messages.length;
                localStorage.setItem('msgMemory', JSON.stringify(msgMemory));
            } catch(e) {}
        }

        async function sendChatMessage(customText = null) {
            const inp = document.getElementById('chatInput');
            const text = customText || inp.value.trim();
            if(!text) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            inp.value = '';
            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
                loadMessages();
            } catch(e) {}
        }

        async function sendChatMessageSilently(to, text) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try { fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${to}&text=${encodeURIComponent(text)}`); } catch(e) {}
        }

        function closeChat() {
            isChatOpen = false;
            document.getElementById('chatPage').style.display = 'none';
            clearInterval(chatInterval);
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'friendsPage') fetchFriendsData();
            localStorage.setItem('lastPage', id);
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const syncIcon = document.getElementById('syncIcon');
            syncIcon.classList.add('fa-spin');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                renderFriends(data);
            } catch(e) {}
            syncIcon.classList.remove('fa-spin');
        }

        async function searchFriend() {
            const p = document.getElementById('friendPhone').value.trim();
            const user = JSON.parse(localStorage.getItem('appUser'));
            if(p === user.phone) return Swal.fire('خطأ', 'لا يمكنك إضافة نفسك', 'info');
            Swal.showLoading();
            const res = await fetch(`${SCRIPT_URL}?action=search&phone=${p}`);
            const data = await res.json();
            Swal.close();
            if(data.found) {
                document.getElementById('searchResult').style.display = 'block';
                document.getElementById('foundName').innerText = data.name;
                window.searchedPhone = p;
            } else { Swal.fire('غير موجود', 'الرقم غير مسجل', 'error'); }
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=request&from=${user.phone}&to=${window.searchedPhone}`);
            Swal.fire('تم!', 'أرسلنا طلب الصداقة', 'success');
            document.getElementById('searchResult').style.display = 'none';
        }

        async function respond(phone, act) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=respond&me=${user.phone}&friend=${phone}&act=${act}`);
            fetchFriendsData();
        }

        initApp();
    </script>
</body>
</html>
