<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة التحدي 🔥</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4d00; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.07); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); background-image: radial-gradient(circle at bottom, #2c0b05 0%, #0a0a0a 70%); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .sub-page { display: none; animation: fadeIn 0.3s ease; width: 100%; max-width: 500px; margin: auto; }
        .active-section { display: block; }
        .fire-title { font-size: 32px; font-weight: 900; text-align: center; margin: 30px 0; color: var(--fire); text-shadow: 0 0 10px rgba(255,77,0,0.5); }
        .main-btn { background: var(--card); border: 2px solid var(--fire); padding: 20px; border-radius: 20px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; transition: 0.3s; margin-bottom: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 12px; border-radius: 10px; border: none; background: #1a1f2e; color: white; flex: 1; cursor: pointer; }
        .tab-btn.active { background: var(--fire); }
        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; border-right: 4px solid var(--fire); backdrop-filter: blur(5px); }
        .back-nav { color: var(--fire); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 25px; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; }
        #searchResult { display: none; margin-top: 15px; padding: 15px; background: rgba(46, 213, 115, 0.1); border: 1px dashed var(--accent); border-radius: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mainMenu" class="sub-page active-section">
        <div class="fire-title">ساحة التحدي 🔥</div>
        <button class="main-btn" onclick="showSection('friendsPage'); fetchFriendsData();"><i class="fas fa-users"></i> الأصدقاء والطلبات</button>
        <button class="main-btn" onclick="showSection('selfPage')"><i class="fas fa-fist-raised"></i> تحدي نفسك (50 يوم)</button>
        <button class="main-btn" onclick="window.location.href='dash_boared.html'" style="border-color:#555;"><i class="fas fa-home"></i> العودة لصفحتي</button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div class="back-nav" onclick="showSection('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('myFriends')">أصدقائي</button>
            <button class="tab-btn" onclick="switchTab('receivedReq')">طلبات واردة</button>
            <button class="tab-btn" onclick="switchTab('addTab')">إضافة صديق</button>
        </div>
        <div id="myFriends" class="tab-content">
            <div id="friendsList"></div>
        </div>
        <div id="receivedReq" class="tab-content" style="display:none;">
            <div id="receivedList"></div>
        </div>
        <div id="addTab" class="tab-content" style="display:none;">
            <div class="card">
                <div style="display: flex; gap: 8px;">
                    <input type="tel" id="friendPhone" placeholder="رقم هاتف الصديق">
                    <button onclick="searchFriend()" style="background:var(--fire); border:none; color:white; width: 50px; border-radius:10px;"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResult">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div><h4 id="foundName" style="margin:0; color:var(--accent);">الاسم</h4><small id="foundPhone"></small></div>
                        <button onclick="finalSendRequest()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; color:black;">إرسال طلب</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="selfPage" class="sub-page">
        <div class="back-nav" onclick="showSection('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        <div class="card">
            <h3>تحدي اليوم</h3>
            <p>ذاكر لمدة 50 دقيقة بتركيز كامل لرفع نقاطك.</p>
            <button class="main-btn" onclick="window.location.href='dash_boared.html?open=timer&start=true'" style="border-color:var(--accent);">ابدأ الآن</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbyLM5YTcFrQm_vUOWcc2vOUd1gpd6peAQ8EXB-CIIoenD6-nhLpYURK5_2B4GsrZ1Z9/exec";
        
        // --- نظام كشف المستخدم الذكي ---
        let userData = JSON.parse(localStorage.getItem('activeStudent')) || {};
        let myPhone = userData.phone || userData.phoneNum || "";
        
        // تصحيح الرقم لو الصفر ممسوح
        if (myPhone && myPhone.toString().length === 10 && myPhone.toString().startsWith('1')) {
            myPhone = '0' + myPhone;
        }

        let lastFoundPhone = "";

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        async function searchFriend() {
            let phone = document.getElementById('friendPhone').value.trim();
            if (phone.startsWith('1') && phone.length === 10) phone = '0' + phone;
            if(!phone) return;
            
            Swal.fire({ title: 'جاري البحث...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${SCRIPT_URL}?action=searchUser&phone=${phone}`);
                const data = await res.json();
                Swal.close();
                if(data.status === 'success') {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    document.getElementById('foundPhone').innerText = data.user.phone;
                    lastFoundPhone = data.user.phone;
                } else {
                    Swal.fire('غير موجود', 'هذا الرقم غير مسجل', 'error');
                }
            } catch(e) { Swal.fire('خطأ', 'فشل الاتصال بالشيت', 'error'); }
        }

        async function finalSendRequest() {
            // التحقق النهائي من رقم المرسل لمنع الـ undefined
            if(!myPhone) {
                return Swal.fire('تنبيه', 'لم نتمكن من معرفة حسابك، يرجى تسجيل الخروج والدخول مرة أخرى', 'warning');
            }

            Swal.fire({ title: 'جاري الإرسال...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${SCRIPT_URL}?action=addFriend&sender=${myPhone}&receiver=${lastFoundPhone}`);
                const data = await res.json();
                Swal.fire(data.status === 'success' ? 'تم!' : 'فشل', data.message, data.status);
                if(data.status === 'success') document.getElementById('searchResult').style.display = 'none';
            } catch(e) { Swal.fire('خطأ', 'فشل إرسال الطلب', 'error'); }
        }

        async function fetchFriendsData() {
            if(!myPhone) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${myPhone}`);
                const data = await res.json();
                renderLists(data);
            } catch(e) { console.log("Fetch Error"); }
        }

        function renderLists(data) {
            document.getElementById('friendsList').innerHTML = data.friends.length ? data.friends.map(f => `
                <div class="card"><div style="display:flex; justify-content:space-between; align-items:center;">
                <span><i class="fas fa-circle" style="color:var(--accent); font-size:10px;"></i> ${f.name}</span>
                <button onclick="Swal.fire('تحدي','سيتم تفعيلها قريباً','info')" style="background:var(--fire); border:none; padding:5px 10px; border-radius:8px; font-size:12px; color:white;">تحدي</button>
                </div></div>`).join('') : '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء</p>';

            document.getElementById('receivedList').innerHTML = data.received.length ? data.received.map(r => `
                <div class="card"><div style="display:flex; justify-content:space-between; align-items:center;">
                <span>${r.name}</span><div>
                <button onclick="respond('${r.phone}','accept')" style="background:var(--accent); border:none; padding:8px; border-radius:8px; margin-left:5px;"><i class="fas fa-check"></i></button>
                <button onclick="respond('${r.phone}','reject')" style="background:rgba(255,0,0,0.5); border:none; padding:8px; border-radius:8px;"><i class="fas fa-times"></i></button>
                </div></div></div>`).join('') : '<p style="text-align:center; opacity:0.5;">لا توجد طلبات</p>';
        }

        async function respond(target, action) {
            Swal.fire({ title: 'جاري المعالجة...', didOpen: () => Swal.showLoading() });
            await fetch(`${SCRIPT_URL}?action=respondRequest&user=${myPhone}&target=${target}&status=${action}`);
            Swal.fire('تم!', '', 'success');
            fetchFriendsData();
        }
    </script>
</body>
</html>
