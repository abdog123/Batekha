<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة التحدي 🔥</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4d00; --dark: #0a0a0a; --accent: #2ed573; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .sub-page { display: none; animation: fadeIn 0.3s ease; }
        .active-section { display: block; }
        .fire-title { font-size: 30px; text-align: center; margin: 25px 0; font-weight: 900; color: var(--fire); text-shadow: 0 0 10px rgba(255,77,0,0.4); }
        .main-btn { background: rgba(255,255,255,0.05); border: 2px solid var(--fire); padding: 18px; border-radius: 15px; color: white; width: 100%; margin-bottom: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card { background: #1a1f2e; padding: 15px; border-radius: 12px; border-right: 4px solid var(--fire); margin-bottom: 10px; }
        .back-nav { color: var(--fire); cursor: pointer; margin-bottom: 20px; display: block; }
        input { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid #333; color: white; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #1a1f2e; color: white; border-radius: 8px; font-size: 12px; }
        .tab-btn.active { background: var(--fire); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mainMenu" class="sub-page active-section">
        <div class="fire-title">ساحة التحدي 🔥</div>
        <button class="main-btn" onclick="showSec('friendsPage'); fetchFriends();"><i class="fas fa-users"></i> الأصدقاء والطلبات</button>
        <button class="main-btn" onclick="showSec('dailyPage')"><i class="fas fa-bolt"></i> تحدي اليوم</button>
        <button class="main-btn" style="border-color:#555" onclick="window.location.href='dash_boared.html'"><i class="fas fa-arrow-right"></i> رجوع لصفحتي</button>
    </div>

    <div id="friendsPage" class="sub-page">
        <span class="back-nav" onclick="showSec('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع للقائمة</span>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list')">أصدقائي</button>
            <button class="tab-btn" onclick="switchTab('req')">طلبات</button>
            <button class="tab-btn" onclick="switchTab('add')">إضافة</button>
        </div>
        <div id="list" class="tab-cont"></div>
        <div id="req" class="tab-cont" style="display:none"></div>
        <div id="add" class="tab-cont" style="display:none">
            <div class="card" style="border-color: var(--accent)">
                <div style="display:flex; gap:5px;">
                    <input type="tel" id="fPhone" placeholder="رقم الهاتف">
                    <button onclick="searchF()" style="background:var(--accent); border:none; border-radius:10px; padding:0 15px;"><i class="fas fa-search"></i></button>
                </div>
                <div id="resBox" style="display:none; margin-top:15px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span id="resName" style="font-weight:bold"></span>
                        <button onclick="sendReq()" style="background:var(--accent); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">إضافة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dailyPage" class="sub-page">
        <span class="back-nav" onclick="showSec('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع</span>
        <div class="card">
            <h3 style="color:var(--fire); margin:0;">تحدي التركيز العميق 🧘</h3>
            <p style="font-size:14px; opacity:0.8;">ذاكر مادة "التخصص" لمدة 45 دقيقة بدون أي تشتيت.</p>
            <button class="main-btn" style="border-color:var(--accent)" onclick="window.location.href='dash_boared.html?open=timer&start=true'">ابدأ التحدي الآن</button>
        </div>
    </div>

    <script>
        // الرابط الجديد بتاعك
        const API = "Https://script.google.com/macros/s/AKfycbyGXl97GlNYKNsR6SuYUclnft0PSzGbt1f2Zt992bU3p400NjA3F10Hjtc7WDTMNzve/exec";
        const user = JSON.parse(localStorage.getItem('activeStudent')) || {};
        let foundPhone = "";

        function showSec(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-cont').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        async function searchF() {
            const ph = document.getElementById('fPhone').value;
            if(!ph) return;
            Swal.fire({title: 'جاري البحث...', didOpen: () => Swal.showLoading()});
            try {
                const r = await fetch(`${API}?action=searchUser&phone=${ph}`);
                const d = await r.json(); Swal.close();
                if(d.status==='success') {
                    document.getElementById('resBox').style.display='block';
                    document.getElementById('resName').innerText = d.user.name;
                    foundPhone = d.user.phone;
                } else { Swal.fire('عفواً', 'الرقم مش مسجل عندنا 🍉', 'error'); }
            } catch(e) { Swal.fire('خطأ', 'فشل الاتصال بالشيت', 'error'); }
        }

        async function sendReq() {
            Swal.fire({title: 'جاري الإرسال...', didOpen: () => Swal.showLoading()});
            const r = await fetch(`${API}?action=addFriend&sender=${user.phone}&receiver=${foundPhone}`);
            const d = await r.json();
            Swal.fire(d.status==='success'?'تم!':'فشل', d.message, d.status);
            if(d.status==='success') document.getElementById('resBox').style.display='none';
        }

        async function fetchFriends() {
            try {
                const r = await fetch(`${API}?action=getFriends&phone=${user.phone}`);
                const d = await r.json();
                document.getElementById('list').innerHTML = d.friends.length ? d.friends.map(f => `<div class="card">${f.name}</div>`).join('') : '<p style="text-align:center; opacity:0.5">لا يوجد أصدقاء حالياً</p>';
                document.getElementById('req').innerHTML = d.received.length ? d.received.map(req => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>${req.name}</span><button onclick="respond('${req.phone}')" style="background:var(--accent); border:none; padding:5px 10px; border-radius:5px;"><i class="fas fa-check"></i> قبول</button></div>`).join('') : '<p style="text-align:center; opacity:0.5">لا توجد طلبات واردة</p>';
            } catch(e) { console.log("Fetch Error"); }
        }

        async function respond(p) {
            Swal.fire({title: 'جاري القبول...', didOpen: () => Swal.showLoading()});
            await fetch(`${API}?action=respondRequest&user=${user.phone}&target=${p}&status=accept`);
            Swal.fire('مبروك!', 'بقيتم أصدقاء 🍉', 'success');
            fetchFriends();
        }
    </script>
</body>
</html>
