<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.08); }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: right;
            overscroll-behavior-y: contain; 
            overflow-x: hidden;
        }

        /* تأثيرات حية للأزرار */
        .main-btn, button {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .main-btn:active, button:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }
        .main-btn:hover {
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); border: none; padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        
        #setupOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:9999; align-items:center; justify-content:center; padding:20px; }

        /* ستايل الشات */
        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--card); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.sent { background: var(--primary); align-self: flex-start; }
        .msg.received { background: #333; align-self: flex-end; }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; background: var(--card); }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">مرحباً بك</h2>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف">
            <button id="setupBtn" onclick="saveAndLock()" class="main-btn">تفعيل الدخول ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:30px 0;">
            <div style="font-size:24px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent);"></div>
        </div>
        
        <button class="main-btn" onclick="goToFriends()">
            <i class="fas fa-user-friends"></i> قائمة الأصدقاء والطلبات
        </button>
        
        <button onclick="goBackToMain()" style="background:rgba(255,255,255,0.1); border:1px solid #444; color:white; margin-top:20px; width:100%; padding:15px; border-radius:15px; cursor:pointer; font-weight:bold;">
            <i class="fas fa-arrow-left"></i> العودة للرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; padding:10px;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <button onclick="fetchFriendsData()" style="background:var(--card); border:1px solid var(--accent); color:white; padding:8px 15px; border-radius:10px;">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <div class="card">
            <h4>إضافة صديق</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="رقم الهاتف" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--primary); border:none; padding:0 15px; border-radius:10px; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; text-align:center;">
                <p id="foundName" style="color:var(--accent); font-weight: bold;"></p>
                <button id="sendReqBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب الصداقة ➕</button>
            </div>
        </div>

        <h4>الطلبات</h4>
        <div id="receivedList"></div>
        <h4>أصدقائي (اضغط للمحادثة)</h4>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer;"></i>
            <span id="chatFriendName" style="font-weight:bold;">الصديق</span>
        </div>
        <div class="chat-messages" id="chatMsgs">
            <div style="text-align:center; color:#888; font-size:12px; margin-top:20px;">
                ⚠️ تنبيه: يرجى التحدث مع الصديق بكل أدب واحترام.
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالتك..." style="margin:0;">
            <button onclick="sendChatMessage()" style="background:var(--accent); border:none; padding:0 20px; border-radius:12px; color:black;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbyADgRe1CENcVwR6-Ckij0nfn8r_8mDBD0eD8_MOTMAE0mYC6F-KbcqY8QwDVgm8gCI/exec";

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'block';
                document.getElementById('welcomeUser').innerText = `مرحباً، ${user.name}`;
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        initApp();

        function saveAndLock() {
            const name = document.getElementById('setupName').value;
            const phone = document.getElementById('setupPhone').value;
            if(name && phone) {
                localStorage.setItem('appUser', JSON.stringify({ name: name, phone: phone }));
                initApp();
            }
        }

        function searchFriend() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            let p = document.getElementById('friendPhone').value;
            
            // منع إضافة النفس
            if(p === user.phone) {
                Swal.fire('عذراً!', 'لا يمكنك إرسال طلب صداقة لنفسك يا بطل 🍉', 'info');
                return;
            }

            Swal.fire({title: 'جاري البحث...', didOpen: () => Swal.showLoading()});
            fetch(`${SCRIPT_URL}?action=searchUser&phone=${p}`)
            .then(res => res.json())
            .then(data => {
                Swal.close();
                if(data.status === 'success') {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    window.targetPhone = data.user.phone;
                } else {
                    Swal.fire('خطأ', 'الرقم غير موجود', 'error');
                }
            });
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
            const data = await res.json();
            
            document.getElementById('friendsList').innerHTML = data.friends.map(f => `
                <div class="card" onclick="openChat('${f.name}', '${f.phone}')" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <span>✅ ${f.name}</span>
                    <i class="fas fa-comment-dots" style="color:var(--primary);"></i>
                </div>
            `).join('') || 'لا يوجد أصدقاء حالياً';
        }

        // منطق الشات
        function openChat(name, phone) {
            Swal.fire({
                title: 'تذكر!',
                text: `أنت الآن تتحدث مع ${name}. يرجى الالتزام بالأدب والاحترام المتبادل 🍉`,
                icon: 'info',
                confirmButtonText: 'موافق، ابدأ المحادثة'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('chatPage').style.display = 'flex';
                    document.getElementById('chatFriendName').innerText = name;
                    window.currentChatPhone = phone;
                }
            });
        }

        function closeChat() {
            document.getElementById('chatPage').style.display = 'none';
        }

        function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            if(!inp.value) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg sent';
            msgDiv.innerText = inp.value;
            document.getElementById('chatMsgs').appendChild(msgDiv);
            inp.value = '';
            document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;
            // ملاحظة: هنا يجب ربط إرسال الرسالة بقاعدة البيانات (Google Sheets) ليراها الطرف الآخر
        }

        function goBackToMain() { window.history.back(); }
        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function goToFriends() { showSection('friendsPage'); fetchFriendsData(); }
        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=addFriend&sender=${user.phone}&receiver=${window.targetPhone}`);
            Swal.fire('تم الإرسال', 'تم إرسال الطلب بنجاح', 'success');
            document.getElementById('searchResult').style.display = 'none';
        }
    </script>
</body>
</html>
