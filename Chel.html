<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00d2ff; --dark: #0f172a; --accent: #00ff88; 
            --card: rgba(30, 41, 59, 0.7); --wa-bg: #0b141a;
            --wa-sent: #005c4b; --wa-received: #202c33;
            --danger: #ff4757; --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: #f8fafc; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', Roboto, sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden; min-height: 100vh;
        }

        .card { 
            background: var(--card); padding: 20px; border-radius: 24px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); position: relative;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .main-btn { 
            background: linear-gradient(135deg, var(--primary), #3a86ff); 
            padding: 16px; border-radius: 18px; color: white; width: 100%; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; 
            gap: 12px; border:none; cursor:pointer; position: relative; 
            margin-bottom: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .main-btn:active { transform: scale(0.97); }

        /* النقطة الحمراء الذكية */
        .notif-dot { 
            position: absolute; top: -5px; right: -5px; width: 14px; height: 14px; 
            background: var(--danger); border-radius: 50%; border: 2px solid #fff; 
            display: none; z-index: 20; box-shadow: 0 0 12px var(--danger);
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
        
        .chat-icon-btn {
            position: relative; background: var(--glass);
            width: 50px; height: 50px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-icon-btn:hover { background: var(--primary); color: white; }

        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input { 
            width: 100%; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; 
        }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: #202c33; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 10px 15px; border-radius: 16px; max-width: 78%; font-size: 15px; position: relative; color: #e9edef; line-height: 1.4; }
        .msg.sent { background: var(--wa-sent); align-self: flex-start; border-top-right-radius: 4px; }
        .msg.received { background: var(--wa-received); align-self: flex-end; border-top-left-radius: 4px; }
        
        .msg-info { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 10px; margin-top: 5px; opacity: 0.6; }
        .refresh-btn { background: var(--accent); color: #003322; padding: 10px 18px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .searching-text { text-align: center; color: var(--primary); font-size: 14px; padding: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">ساحة الأصدقاء 🤝</h2>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف (01...)">
            <button onclick="saveAndLock()" class="main-btn">دخول ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:50px 0;">
            <div style="font-size:32px; font-weight:900; background: linear-gradient(to left, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ساحة الأصدقاء</div>
            <div id="welcomeUser" style="margin-top:12px; color: #94a3b8; font-size:18px;"></div>
        </div>
        
        <button class="main-btn" onclick="showSection('friendsPage')">
            <div id="mainMenuDot" class="notif-dot" style="top: 10px; left: 10px;"></div>
            <i class="fas fa-user-friends"></i> تحدي مع صديقك
        </button>

        <button class="main-btn" style="background: linear-gradient(135deg, #f59e0b, #d97706);" onclick="Swal.fire('قريباً', 'سيتم إضافة تحديات الذكاء الاصطناعي قريباً!', 'info')">
            <i class="fas fa-trophy"></i> تحدي نفسك (معكش صديق على المنصة)
        </button>

        <button onclick="window.location.href='dash_boared.html'" style="background:var(--glass); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; margin-top:30px; width:100%; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer;">
            <i class="fas fa-home"></i> العودة للمنصة الرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; font-weight:bold; background: var(--glass); padding: 8px 15px; border-radius: 12px;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <button class="refresh-btn" onclick="fetchFriendsData()">
                <i class="fas fa-sync-alt" id="syncIcon"></i> تحديث
            </button>
        </div>
        
        <div class="card">
            <h4><i class="fas fa-search"></i> ابحث عن صديق</h4>
            <div style="display:flex; gap:10px;">
                <input type="tel" id="friendPhone" placeholder="01xxxxxxxxx" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--primary); width:55px; border-radius:14px; border:none; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:20px; text-align:center; border-top: 1px solid var(--glass); padding-top: 15px;">
                <p id="foundName" style="color:var(--accent); font-weight:bold; font-size: 18px;"></p>
                <button id="requestBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب صداقة ➕</button>
            </div>
        </div>

        <h4 style="color:var(--primary);"><i class="fas fa-clock"></i> طلبات معلقة</h4>
        <div id="receivedList"><div class="searching-text">جاري البحث...</div></div>

        <h4 style="color:var(--accent);"><i class="fas fa-check-circle"></i> أصدقائي</h4>
        <div id="friendsList"><div class="searching-text">جاري التحميل...</div></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:22px; color: var(--primary);"></i>
            <span id="chatFriendName" style="font-weight:bold; font-size:18px; flex:1;">...</span>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." autocomplete="off">
            <button onclick="sendChatMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbxo66cbciY4-vFTyi8LG8lAtd0TvAyM0gcYUslNuuVjDnMR6RgUwOnq0e8dSGqexOb_/exec";
        
        let chatInterval = null;
        let globalSyncInterval = null;
        let lastMsgCount = 0;
        let isChatOpen = false;
        let msgMemory = JSON.parse(localStorage.getItem('msgMemory')) || {};

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                showSection(localStorage.getItem('lastPage') || 'mainMenu');
                document.getElementById('welcomeUser').innerText = `أهلاً بك، ${user.name} 👋`;
                startGlobalSync();
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        // الحل الجذري للنقطة الحمراء: تحديث كل 0.5 ثانية ومقارنة ذكية
        function startGlobalSync() {
            if(globalSyncInterval) clearInterval(globalSyncInterval);
            globalSyncInterval = setInterval(async () => {
                const user = JSON.parse(localStorage.getItem('appUser'));
                if(!user || isChatOpen) return;
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                    const data = await res.json();
                    let hasNewMsg = false;
                    
                    data.friends.forEach(f => {
                        const count = f.msgCount || 0;
                        const savedCount = msgMemory[f.phone] || 0;
                        const dot = document.getElementById(`dot-${f.phone}`);
                        
                        if(count > savedCount) {
                            hasNewMsg = true;
                            if(dot) dot.style.display = 'block';
                        } else {
                            if(dot) dot.style.display = 'none';
                        }
                    });
                    
                    const hasRequests = data.received && data.received.length > 0;
                    document.getElementById('mainMenuDot').style.display = (hasNewMsg || hasRequests) ? 'block' : 'none';
                } catch(e) {}
            }, 500); // تحديث فائق السرعة لرصد الرسائل
        }

        function saveAndLock() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'بيانات غير صحيحة', 'error');
            localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
            initApp();
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            localStorage.setItem('lastPage', id);
            if(id === 'friendsPage') fetchFriendsData();
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const syncIcon = document.getElementById('syncIcon');
            if(syncIcon) syncIcon.classList.add('fa-spin');
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                
                document.getElementById('friendsList').innerHTML = data.friends.map(f => {
                    const hasNew = (f.msgCount || 0) > (msgMemory[f.phone] || 0);
                    return `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px 20px;">
                        <b style="font-size:17px;">${f.name}</b>
                        <div class="chat-icon-btn" onclick="openChat('${f.name}', '${f.phone}')">
                            <div id="dot-${f.phone}" class="notif-dot" style="${hasNew ? 'display:block' : 'none'}"></div>
                            <i class="fas fa-comment-dots"></i>
                        </div>
                    </div>
                `}).join('') || '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء حالياً</p>';

                document.getElementById('receivedList').innerHTML = data.received.map(r => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:10px; border-right: 4px solid var(--primary);">
                        <span style="flex:1;"><b>${r.name}</b></span>
                        <div style="display:flex; gap:8px;">
                            <button id="acceptBtn-${r.phone}" onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); color:#000; padding:8px 15px; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">قبول</button>
                            <button onclick="respond('${r.phone}', 'reject')" style="background:var(--danger); color:white; padding:8px 15px; border-radius:10px; border:none; cursor:pointer;">رفض</button>
                        </div>
                    </div>
                `).join('') || '<p style="text-align:center; opacity:0.3;">لا توجد طلبات</p>';
                
                if(syncIcon) syncIcon.classList.remove('fa-spin');
            } catch(e) { if(syncIcon) syncIcon.classList.remove('fa-spin'); }
        }

        async function openChat(name, phone) {
            isChatOpen = true;
            window.currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            document.getElementById('chatMsgs').innerHTML = '<div class="searching-text">جاري تحميل المحادثة...</div>';
            lastMsgCount = 0;
            
            const dot = document.getElementById(`dot-${phone}`);
            if(dot) dot.style.display = 'none';

            loadMessages();
            chatInterval = setInterval(loadMessages, 1500);
        }

        async function loadMessages() {
            if(!isChatOpen) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${window.currentChatPhone}`);
                const data = await res.json();
                
                msgMemory[window.currentChatPhone] = data.messages.length;
                localStorage.setItem('msgMemory', JSON.stringify(msgMemory));

                if (data.messages && data.messages.length > lastMsgCount) {
                    const container = document.getElementById('chatMsgs');
                    container.innerHTML = data.messages.map(m => {
                        const isMe = String(m.sender) === String(user.phone);
                        return `
                            <div class="msg ${isMe ? 'sent' : 'received'}">
                                ${m.text}
                                <div class="msg-info">
                                    <span>${m.time || ''}</span>
                                    ${isMe ? '<i class="fas fa-check-double" style="color:var(--primary)"></i>' : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                    container.scrollTop = container.scrollHeight;
                    lastMsgCount = data.messages.length;
                    
                    if (data.messages[data.messages.length-1].sender !== user.phone) {
                        try { new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play(); } catch(e) {}
                    }
                }
            } catch(e) {}
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if(!text) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            
            const container = document.getElementById('chatMsgs');
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg sent';
            tempDiv.innerHTML = `${text}<div class="msg-info"><span>جاري الإرسال...</span></div>`;
            container.appendChild(tempDiv);
            container.scrollTop = container.scrollHeight;
            inp.value = '';

            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
            } catch(e) { tempDiv.style.background = "#8b0000"; }
        }

        function closeChat() {
            isChatOpen = false;
            document.getElementById('chatPage').style.display = 'none';
            clearInterval(chatInterval);
            fetchFriendsData();
        }

        async function searchFriend() {
            const p = document.getElementById('friendPhone').value.trim();
            if(!p) return;
            Swal.showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&phone=${p}`);
                const data = await res.json();
                Swal.close();
                if(data.found) {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.name;
                    window.searchedPhone = p;
                } else {
                    Swal.fire('غير موجود', 'هذا الرقم غير مسجل حالياً', 'info');
                }
            } catch(e) { Swal.close(); }
        }

        async function sendFriendRequest() {
            const btn = document.getElementById('requestBtn');
            const user = JSON.parse(localStorage.getItem('appUser'));
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";
            try {
                await fetch(`${SCRIPT_URL}?action=request&from=${user.phone}&to=${window.searchedPhone}`);
                Swal.fire('تم', 'تم إرسال طلب الصداقة بنجاح', 'success');
                document.getElementById('searchResult').style.display = 'none';
            } catch(e) { Swal.fire('خطأ', 'فشل الإرسال', 'error'); } 
            finally { btn.disabled = false; btn.innerText = "إرسال طلب صداقة ➕"; }
        }

        async function respond(phone, act) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const btn = document.getElementById(`acceptBtn-${phone}`);
            if(act === 'accept' && btn) { btn.disabled = true; btn.innerText = "..."; }
            try {
                await fetch(`${SCRIPT_URL}?action=respond&me=${user.phone}&friend=${phone}&act=${act}`);
                fetchFriendsData();
            } catch(e) {}
        }

        initApp();
    </script>
</body>
</html>
