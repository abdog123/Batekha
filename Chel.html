<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.08); --chat-bg: #0b141a; }
        
        body { 
            background: var(--dark); color: #fff; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
        }

        /* تأثيرات حية للأزرار */
        .main-btn, button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: none; outline: none; }
        .main-btn:active, button:active { transform: scale(0.95); opacity: 0.8; }
        .main-btn:hover { box-shadow: 0 0 15px rgba(52, 152, 219, 0.4); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }

        /* ستايل الشات المطور */
        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--chat-bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: #202c33; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: var(--chat-bg); background-blend-mode: overlay; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .msg-name { font-size: 11px; font-weight: bold; margin-bottom: 2px; color: var(--accent); }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        .sent { align-self: flex-start; }
        .sent .msg { background: #005c4b; border-top-right-radius: 2px; }
        .received { align-self: flex-end; }
        .received .msg { background: #202c33; border-top-left-radius: 2px; }
        .received .msg-name { color: var(--primary); text-align: left; }

        .chat-input-area { padding: 10px; display: flex; gap: 10px; background: #202c33; align-items: center; }
        
        /* الإشعارات اللحظية */
        .toast-notif { position: fixed; top: 15px; left: 15px; right: 15px; background: var(--primary); color: white; padding: 12px; border-radius: 12px; display: none; z-index: 9999; animation: slideDown 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast" class="toast-notif" onclick="goToFriends()"></div>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">مرحباً بك في الساحة 🤝</h2>
            <p style="font-size:12px; color:#888;">سجل بياناتك لمرة واحدة فقط للبدء</p>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف">
            <button id="setupBtn" onclick="saveAndLock()" class="main-btn">دخول ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:40px 0;">
            <div style="font-size:28px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-size:18px;"></div>
        </div>
        
        <button class="main-btn" onclick="goToFriends()">
            <i class="fas fa-user-friends"></i> قائمة الأصدقاء والطلبات
        </button>
        
        <button onclick="window.location.href='dash_boared.html'" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:#ccc; margin-top:20px; width:100%; padding:15px; border-radius:15px; font-weight:bold;">
            <i class="fas fa-home"></i> العودة للمنصة الرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; padding:5px; font-weight:bold;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <button onclick="fetchFriendsData()" id="refreshBtn" style="background:var(--card); color:var(--accent); padding:8px 15px; border-radius:10px; border:1px solid var(--accent);">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <div class="card">
            <h4><i class="fas fa-search"></i> ابحث عن صديق</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="أدخل رقم الهاتف" style="margin:0;">
                <button onclick="searchFriend()" id="searchBtn" style="background:var(--primary); padding:0 20px; border-radius:12px; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:20px; text-align:center; border-top:1px solid #333; padding-top:15px;">
                <p id="foundName" style="color:var(--accent); font-weight:bold; font-size:18px;"></p>
                <button id="sendReqBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب صداقة ➕</button>
            </div>
        </div>

        <h4 style="color:var(--primary); margin-top:25px;">طلبات الصداقة</h4>
        <div id="receivedList"></div>
        
        <h4 style="color:var(--accent); margin-top:25px;">أصدقائي</h4>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <div style="display:flex; flex-direction:column;">
                <span id="chatFriendName" style="font-weight:bold; font-size:16px;">الاسم</span>
                <span style="font-size:10px; color:var(--accent);">متصل الآن</span>
            </div>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." style="margin:0;">
            <button onclick="sendChatMessage()" id="sendChatBtn" style="background:var(--accent); width:50px; height:45px; border-radius:12px; color:black;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";
        let chatInterval = null;
        let lastMessageCount = 0;

        // نظام الحفظ لآخر مكان
        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'block';
            localStorage.setItem('lastChelPage', id);
        }

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                const lastPage = localStorage.getItem('lastChelPage') || 'mainMenu';
                showSection(lastPage);
                document.getElementById('welcomeUser').innerText = `أهلاً بك، ${user.name} 🍉`;
                if(lastPage === 'friendsPage') fetchFriendsData();
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }
        initApp();

        function saveAndLock() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'بيانات غير مكتملة', 'error');
            localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
            initApp();
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                
                document.getElementById('friendsList').innerHTML = data.friends.map(f => `
                    <div class="card" onclick="openChat('${f.name}', '${f.phone}')" style="display:flex; justify-content:space-between; align-items:center; border-right: 4px solid var(--accent);">
                        <span><i class="fas fa-user-circle"></i> ${f.name}</span>
                        <i class="fas fa-comment-dots" style="color:var(--primary);"></i>
                    </div>
                `).join('') || '<p style="opacity:0.5; text-align:center;">لا يوجد أصدقاء</p>';

                document.getElementById('receivedList').innerHTML = data.received.map(r => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${r.name}</span>
                        <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); color:black; padding:5px 12px; border-radius:8px; font-weight:bold;">قبول</button>
                    </div>
                `).join('') || '<p style="opacity:0.5; text-align:center;">لا توجد طلبات</p>';
            } catch(e) {}
        }

        // --- نظام المحادثة المطور ---
        function openChat(name, phone) {
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            window.currentChatPhone = phone;
            window.currentChatName = name;
            loadMessages();
            chatInterval = setInterval(loadMessages, 500); // تحديث فائق السرعة كل 0.5 ثانية
        }

        async function loadMessages() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${window.currentChatPhone}`);
                const data = await res.json();
                
                // نظام الإشعارات إذا وصلت رسالة جديدة والشات مغلق
                if (data.messages.length > lastMessageCount && document.getElementById('chatPage').style.display === 'none') {
                    showToast(`رسالة جديدة من ${window.currentChatName || 'صديق'}`);
                }
                lastMessageCount = data.messages.length;

                const container = document.getElementById('chatMsgs');
                const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;

                container.innerHTML = data.messages.map(m => `
                    <div class="msg-container ${m.sender === user.phone ? 'sent' : 'received'}">
                        <span class="msg-name">${m.sender === user.phone ? 'أنت' : window.currentChatName}</span>
                        <div class="msg">${m.text}</div>
                    </div>
                `).join('');
                
                if(isAtBottom) container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            const user = JSON.parse(localStorage.getItem('appUser'));
            const text = inp.value.trim();
            if(!text) return;

            // تحديث وقتي في واجهة المرسل قبل الإرسال للسيرفر
            const container = document.getElementById('chatMsgs');
            container.innerHTML += `
                <div class="msg-container sent">
                    <span class="msg-name">أنت</span>
                    <div class="msg" style="opacity:0.7;">${text}</div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            inp.value = ''; 
            
            fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeChat() {
            document.getElementById('chatPage').style.display = 'none';
            clearInterval(chatInterval);
        }

        function searchFriend() {
            let p = document.getElementById('friendPhone').value.trim();
            document.getElementById('searchBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            fetch(`${SCRIPT_URL}?action=searchUser&phone=${p}`)
            .then(r => r.json()).then(data => {
                document.getElementById('searchBtn').innerHTML = '<i class="fas fa-search"></i>';
                if(data.status === 'success') {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    window.targetPhone = data.user.phone;
                } else { Swal.fire('غير موجود', 'الرقم غير مسجل', 'error'); }
            });
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=addFriend&sender=${user.phone}&receiver=${window.targetPhone}`);
            Swal.fire('تم', 'تم الإرسال', 'success');
            document.getElementById('searchResult').style.display = 'none';
        }

        async function respond(target, status) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=respondRequest&user=${user.phone}&target=${target}&status=${status}`);
            fetchFriendsData();
        }

        function goToFriends() { showSection('friendsPage'); fetchFriendsData(); }
    </script>
</body>
</html>
