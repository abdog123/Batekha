<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة التحدي 🔥</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4d00; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.07); }
        body { background: var(--dark); color: #fff; margin: 0; padding: 15px; font-family: 'Segoe UI', sans-serif; text-align: right; }
        .sub-page { display: none; max-width: 500px; margin: auto; animation: fadeIn 0.3s; }
        .active-section { display: block; }
        .fire-title { font-size: 28px; font-weight: 900; text-align: center; color: var(--fire); margin: 20px 0; }
        .main-btn { background: var(--card); border: 2px solid var(--fire); padding: 18px; border-radius: 15px; color: white; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--fire); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; outline: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mainMenu" class="sub-page active-section">
        <div class="fire-title">ساحة التحدي 🔥</div>
        <p id="welcomeMsg" style="text-align: center; color: var(--accent); font-weight: bold;"></p>
        
        <button class="main-btn" onclick="showSection('friendsPage'); fetchFriendsData();">
            <i class="fas fa-users"></i> الأصدقاء والطلبات
        </button>
        <button class="main-btn" onclick="window.location.href='dash_boared.html'" style="border-color:#555;">
            <i class="fas fa-home"></i> العودة للرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div onclick="showSection('mainMenu')" style="color:var(--fire); cursor:pointer; margin-bottom:20px;"><i class="fas fa-arrow-right"></i> رجوع</div>
        
        <div class="card">
            <p style="margin-top:0;">إضافة صديق جديد:</p>
            <div style="display: flex; gap: 5px;">
                <input type="tel" id="friendPhone" placeholder="أدخل رقم الهاتف">
                <button onclick="searchFriend()" style="background:var(--fire); border:none; padding:10px; border-radius:10px; color:white; width:50px;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                <p id="foundName" style="color:var(--accent); font-weight:bold; margin-bottom:10px;"></p>
                <button onclick="sendFriendRequest()" style="background:var(--accent); border:none; width:100%; padding:12px; border-radius:8px; font-weight:bold; color:black;">إرسال طلب صداقة</button>
            </div>
        </div>

        <h4 style="border-bottom:1px solid var(--fire); padding-bottom:5px; color:var(--fire);">طلبات واردة</h4>
        <div id="receivedList"></div>
        
        <h4 style="border-bottom:1px solid var(--accent); padding-bottom:5px; margin-top:20px; color:var(--accent);">أصدقائي</h4>
        <div id="friendsList"></div>
    </div>

    <script>
    const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbyLM5YTcFrQm_vUOWcc2vOUd1gpd6peAQ8EXB-CIIoenD6-nhLpYURK5_2B4GsrZ1Z9/exec";
    
    // الطريقة الذكية لجلب الرقم
    let data = JSON.parse(localStorage.getItem('activeStudent')) || {};
    let myPhone = data.phone || data.phoneNum || localStorage.getItem('userPhone') || "";
    
    // لو الرقم موجود، اعرض الاسم، لو مش موجود، ماتطلعش تنبيه مزعج
    window.onload = () => {
        if (myPhone && document.getElementById('welcomeMsg')) {
            document.getElementById('welcomeMsg').innerText = `أهلاً بك يا ${data.name || 'بطل'} 🍉`;
        }
    };
    
    // عند إرسال الطلب، تأكد إن الرقم موجود
    async function sendFriendRequest() {
        if(!myPhone) return Swal.fire('تنبيه', 'سجل دخولك مرة أخرى لربط الحساب', 'warning');
        // ... كود الإرسال ...
    }
</script>

</body>
</html>
