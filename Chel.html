<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #3498db; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.08); }
        
        /* منع الـ Refresh التلقائي عند السحب لأسفل */
        html, body { 
            overscroll-behavior-y: none; 
            height: 100%; 
            overflow: hidden; 
            background: var(--dark); 
            color: #fff; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* الحاوية التي تسمح بالتمرير الداخلي فقط */
        .app-container {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            box-sizing: border-box;
        }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); border: none; padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background: #444 !important; opacity: 0.7; }

        .sub-page { display: none; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
        .active-section { display: block; }
        
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; font-size: 16px; }
        
        #setupOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:9999; align-items:center; justify-content:center; padding:20px; box-sizing: border-box; }
        
        .refresh-status { color: var(--accent); font-size: 12px; display: none; margin-bottom: 5px; animation: pulse 1s infinite; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">مرحباً بك</h2>
            <p style="font-size: 14px; opacity: 0.8;">سجل بياناتك لمرة واحدة فقط للربط مع أصدقائك</p>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف (مثل 010...)">
            <button id="setupBtn" onclick="saveAndLock()" class="main-btn">تفعيل الحساب ✅</button>
        </div>
    </div>

    <div class="app-container">
        
        <div id="mainMenu" class="sub-page">
            <div style="text-align:center; margin:40px 0;">
                <div style="font-size:28px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
                <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-size: 18px;"></div>
            </div>
            
            <button class="main-btn" onclick="goToFriends()" style="margin-bottom: 15px;">
                <i class="fas fa-user-friends"></i> قائمة الأصدقاء والطلبات
            </button>
            
          <button onclick="goToHome()" style="background:var(--card); border:1px solid var(--primary); color:white; margin-top:30px; width:100%; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold;">
    <i class="fas fa-home"></i> العودة للمنصة الرئيسية
</button>

        </div>

        <div id="friendsPage" class="sub-page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div onclick="showSection('mainMenu')" style="cursor:pointer; color: var(--primary); font-weight: bold;"><i class="fas fa-arrow-right"></i> رجوع</div>
                <div style="text-align:left;">
                    <span id="refreshTxt" class="refresh-status">جاري المزامنة...</span>
                    <button onclick="fetchFriendsData()" style="background:var(--card); border:1px solid var(--accent); color:white; padding:8px 12px; border-radius:10px;">
                        <i id="syncIcon" class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="card">
                <h4 style="margin-top:0;"><i class="fas fa-user-plus"></i> إضافة صديق جديد</h4>
                <div style="display:flex; gap:8px;">
                    <input type="tel" id="friendPhone" placeholder="رقم هاتف الصديق" style="margin:0;">
                    <button onclick="searchFriend()" style="background:var(--primary); border:none; padding:0 20px; border-radius:10px; color:white;"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResult" style="display:none; margin-top:20px; text-align:center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                    <p id="foundName" style="color:var(--accent); font-weight: bold; font-size: 18px;"></p>
                    <button id="sendReqBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب ➕</button>
                </div>
            </div>

            <h4 style="border-right: 4px solid var(--primary); padding-right: 10px;">طلبات واردة</h4>
            <div id="receivedList"></div>
            
            <h4 style="border-right: 4px solid var(--accent); padding-right: 10px; margin-top: 25px;">أصدقائي</h4>
            <div id="friendsList"></div>
        </div>

    </div>

    <script>
        // ضع رابط الـ Web App الخاص بك هنا
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbyADgRe1CENcVwR6-Ckij0nfn8r_8mDBD0eD8_MOTMAE0mYC6F-KbcqY8QwDVgm8gCI/exec";

        // منع السحب لأسفل نهائياً (Anti-Refresh)
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.app-container')) return; // السماح بالتمرير داخل الحاوية فقط
            e.preventDefault();
        }, { passive: false });

        // فحص الهوية الفوري
        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const setupOverlay = document.getElementById('setupOverlay');
            const mainMenu = document.getElementById('mainMenu');

            if (user && user.phone) {
                setupOverlay.style.display = 'none';
                mainMenu.style.display = 'block';
                document.getElementById('welcomeUser').innerText = `مرحباً، ${user.name} ✨`;
            } else {
                setupOverlay.style.display = 'flex';
                mainMenu.style.display = 'none';
            }
        }

        initApp();

        async function saveAndLock() {
            const name = document.getElementById('setupName').value.trim();
            const phone = document.getElementById('setupPhone').value.trim();
            const btn = document.getElementById('setupBtn');

            if (name.length < 3 || phone.length < 10) {
                return Swal.fire('بيانات ناقصة', 'يرجى إدخال اسمك الحقيقي ورقم هاتفك الصحيح', 'warning');
            }

            btn.disabled = true;
            btn.innerText = "جاري التفعيل...";

            // حفظ محلي فوري
            localStorage.setItem('appUser', JSON.stringify({ name: name, phone: phone }));
            
            // محاكاة الاتصال بالسيرفر (يمكنك إضافة Fetch هنا لتسجيل المستخدم في الشيت)
            setTimeout(() => {
                initApp();
                Swal.fire('تم التفعيل', 'أهلاً بك في ساحة الأصدقاء', 'success');
            }, 800);
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function goToFriends() {
            showSection('friendsPage');
            fetchFriendsData();
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if(!user) return;

            const txt = document.getElementById('refreshTxt');
            const icon = document.getElementById('syncIcon');

            txt.style.display = 'inline';
            icon.classList.add('fa-spin');

            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                
                document.getElementById('friendsList').innerHTML = data.friends.length ? 
                    data.friends.map(f => `<div class="card" style="border-right: 5px solid var(--accent);">✅ ${f.name}</div>`).join('') : '<p style="opacity:0.5; text-align:center;">لا يوجد أصدقاء بعد</p>';

                document.getElementById('receivedList').innerHTML = data.received.length ? 
                    data.received.map(r => `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <span>${r.name}</span>
                            <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; color:black; font-weight:bold;">قبول</button>
                        </div>
                    `).join('') : '<p style="opacity:0.5; text-align:center;">لا توجد طلبات معلقة</p>';
            } catch(e) { 
                console.error("Connection Error");
            } finally {
                txt.style.display = 'none';
                icon.classList.remove('fa-spin');
            }
        }

        async function searchFriend() {
            let p = document.getElementById('friendPhone').value.trim();
            if(!p) return;
            
            Swal.fire({ title: 'جاري البحث...', didOpen: () => Swal.showLoading() });
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=searchUser&phone=${p}`);
                const data = await res.json();
                Swal.close();
                
                if(data.status === 'success') {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    window.targetPhone = data.user.phone;
                } else { 
                    Swal.fire('غير موجود', 'هذا الرقم غير مسجل في المنصة حالياً', 'info'); 
                }
            } catch(e) { 
                Swal.fire('فشل الاتصال', 'تأكد من الإنترنت وحاول مرة أخرى', 'error'); 
            }
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const btn = document.getElementById('sendReqBtn');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";
            
            try {
                await fetch(`${SCRIPT_URL}?action=addFriend&sender=${user.phone}&receiver=${window.targetPhone}`);
                Swal.fire('تم الإرسال', 'سيظهر طلبك عند الصديق فوراً', 'success');
                document.getElementById('searchResult').style.display = 'none';
            } catch(e) { 
                Swal.fire('خطأ', 'حدثت مشكلة أثناء إرسال الطلب', 'error'); 
            } finally {
                btn.disabled = false; 
                btn.innerText = "إرسال طلب ➕";
            }
        }

        function logout() {
            Swal.fire({
                title: 'هل تريد الخروج؟',
                text: "سيتم حذف بيانات الدخول من هذا الجهاز",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff4757',
