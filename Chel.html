<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة التحدي 🔥 - بطيختي</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire-bg: #0a0a0a; --orange: #ff4d00; --yellow: #ffae00; --accent: #2ed573; --red: #ff4757; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fire-bg); background-image: radial-gradient(circle at bottom, #2c0b05 0%, #0a0a0a 70%); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }

        .sub-page { display: none; animation: fadeIn 0.3s ease; width: 100%; max-width: 500px; margin: auto; }
        .active-section { display: block; }
        
        .fire-title { font-size: 32px; font-weight: 900; text-align: center; margin: 30px 0; background: linear-gradient(#fff, var(--yellow), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,77,0,0.5)); }

        .menu-grid { display: grid; gap: 15px; width: 100%; }
        .main-btn { background: rgba(255,255,255,0.05); border: 2px solid var(--orange); padding: 22px; border-radius: 20px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .main-btn:active { transform: scale(0.95); background: rgba(255,77,0,0.1); }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0; }
        .tab-btn { white-space: nowrap; padding: 10px 15px; border-radius: 10px; border: none; background: #1a1f2e; color: white; font-size: 12px; flex: 1; }
        .tab-btn.active { background: var(--orange); }
        
        .card { background: rgba(255,255,255,0.07); padding: 18px; border-radius: 15px; margin-bottom: 12px; border-right: 4px solid var(--orange); backdrop-filter: blur(5px); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .offline { background: #555; }

        .back-nav { color: var(--yellow); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 25px; font-weight: bold; font-size: 18px; }
        
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--orange); }

        /* ستايل نتيجة البحث */
        #searchResult { display: none; margin-top: 15px; padding: 15px; background: rgba(46, 213, 115, 0.1); border: 1px dashed var(--accent); border-radius: 12px; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="mainMenu" class="sub-page active-section">
        <div class="fire-title">ساحة التحدي 🔥</div>
        <div class="menu-grid">
            <button class="main-btn" onclick="showSection('friendsPage'); fetchFriendsData();">
                <i class="fas fa-users"></i> تحدي الأصدقاء
            </button>
            <button class="main-btn" onclick="showSection('selfPage')">
                <i class="fas fa-fist-raised"></i> تحدي نفسك
            </button>
            <button class="main-btn" onclick="window.location.href='dash_boared.html'" style="border-color:#555; margin-top:20px; font-size:15px;">
                <i class="fas fa-arrow-right"></i> العودة لصفحة الطلاب
            </button>
        </div>
    </div>

    <div id="friendsPage" class="sub-page">
        <div class="back-nav" onclick="showSection('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('myFriends')">أصدقائي</button>
            <button class="tab-btn" onclick="switchTab('receivedReq')">طلبات واردة</button>
            <button class="tab-btn" onclick="switchTab('addTab')">إضافة صديق</button>
        </div>

        <div id="myFriends" class="tab-content">
            <div id="friendsList"><p style="text-align:center; opacity:0.5;">جاري التحميل...</p></div>
        </div>

        <div id="receivedReq" class="tab-content" style="display:none;">
            <div id="receivedList"><p style="text-align:center; opacity:0.5;">لا توجد طلبات جديدة</p></div>
        </div>

        <div id="addTab" class="tab-content" style="display:none;">
            <div class="card">
                <label style="font-size: 12px; margin-bottom: 8px; display: block;">ابحث عن رقم هاتف الصديق:</label>
                <div style="display: flex; gap: 8px;">
                    <input type="tel" id="friendPhone" placeholder="01xxxxxxxxx" style="margin:0;">
                    <button onclick="searchFriend()" style="background:var(--primary); border:none; color:white; width: 50px; border-radius:10px;">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <div id="searchResult">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h4 id="foundName" style="margin:0; color:var(--accent);">الاسم يظهر هنا</h4>
                            <small id="foundPhone" style="opacity:0.6;"></small>
                        </div>
                        <button onclick="finalSendRequest()" style="background:var(--accent); border:none; color:black; padding:8px 15px; border-radius:8px; font-weight:bold;">إرسال طلب</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="selfPage" class="sub-page">
        <div class="back-nav" onclick="showSection('mainMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        <h3 style="color:var(--yellow); margin-bottom:20px;">تحدي اليوم</h3>
        <div class="card" style="border-color: var(--accent);">
            <h4 id="chTitle">تركيز الرهبان 🧘</h4>
            <p id="chDesc" style="font-size:14px; opacity:0.8;">ذاكر لمدة 50 دقيقة بدون لمس الموبايل نهائياً.</p>
            <button class="main-btn" style="width:100%; padding:12px; border-color:var(--accent);" onclick="window.location.href='dash_boared.html?open=timer&start=true'">ابدأ التحدي</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQvQFMk1xmUGm9VSLjZbd_laF57iRg2Z08_H3EHJtpDSlwtwN8uOp5fPCFmCIdf_ie/exec";
        const currentUser = JSON.parse(localStorage.getItem('activeStudent')) || {};
        let lastFoundPhone = "";

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }

        // 1. البحث عن الصديق
        async function searchFriend() {
            const phone = document.getElementById('friendPhone').value;
            if(!phone) return;
            
            Swal.fire({ title: 'جاري البحث...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${SCRIPT_URL}?action=searchUser&phone=${phone}`);
                const data = await res.json();
                
                if(data.status === 'success') {
                    Swal.close();
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    document.getElementById('foundPhone').innerText = data.user.phone;
                    lastFoundPhone = data.user.phone;
                } else {
                    Swal.fire('غير موجود', 'هذا الرقم غير مسجل بالمنصة', 'error');
                }
            } catch(e) { Swal.fire('خطأ', 'فشل الاتصال بالشيت', 'error'); }
        }

        // 2. إرسال الطلب الفعلي
        async function finalSendRequest() {
            Swal.fire({ title: 'جاري الإرسال...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${SCRIPT_URL}?action=addFriend&sender=${currentUser.phone}&receiver=${lastFoundPhone}`);
                const data = await res.json();
                Swal.fire(data.status === 'success' ? 'تم!' : 'فشل', data.message, data.status);
                if(data.status === 'success') document.getElementById('searchResult').style.display = 'none';
            } catch(e) { Swal.fire('خطأ', 'حدث خطأ غير متوقع', 'error'); }
        }

        // جلب قائمة الأصدقاء والطلبات
        async function fetchFriendsData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${currentUser.phone}`);
                const data = await res.json();
                
                const fList = document.getElementById('friendsList');
                fList.innerHTML = data.friends.length ? data.friends.map(f => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span><span class="status-dot ${f.online ? 'online' : 'offline'}"></span> ${f.name}</span>
                            <button onclick="Swal.fire('تحدي','أرسلت تحدي لـ ${f.name}','info')" style="background:var(--accent); border:none; padding:5px 10px; border-radius:5px; font-weight:bold;">تحدي</button>
                        </div>
                    </div>
                `).join('') : '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء</p>';

                const rList = document.getElementById('receivedList');
                rList.innerHTML = data.received.length ? data.received.map(r => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>${r.name}</span>
                            <div>
                                <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); border:none; padding:8px; border-radius:5px;"><i class="fas fa-check"></i></button>
                                <button onclick="respond('${r.phone}', 'reject')" style="background:var(--red); border:none; padding:8px; border-radius:5px; margin-right:5px;"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('') : '<p style="text-align:center; opacity:0.5;">لا توجد طلبات</p>';
            } catch(e) { console.log("Fetch Error"); }
        }

        async function respond(target, action) {
            Swal.fire({ title: 'جاري المعالجة...', didOpen: () => Swal.showLoading() });
            await fetch(`${SCRIPT_URL}?action=respondRequest&user=${currentUser.phone}&target=${target}&status=${action}`);
            Swal.fire('تم!', '', 'success');
            fetchFriendsData();
        }
    </script>
</body>
</html>
