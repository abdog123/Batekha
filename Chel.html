<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء PRO 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-body: #070b14;
            --primary: #6366f1; /* Indigo Neon */
            --secondary: #a855f7; /* Purple Neon */
            --accent: #10b981; /* Emerald */
            --danger: #f43f5e; /* Rose */
            --card-bg: rgba(30, 41, 59, 0.7);
            --wa-bg: #0b141a;
            --wa-sent: #3730a3;
            --wa-received: #1e293b;
        }
        
        body { 
            background: var(--bg-body);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.15), transparent);
            color: #f8fafc; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
            min-height: 100vh;
        }

        /* تحسين شكل الكروت */
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(16px); 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .main-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            padding: 16px; border-radius: 18px; color: white; width: 100%; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; 
            gap: 12px; border:none; cursor:pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .main-btn:active { transform: scale(0.98); }

        /* زر التحدي الجديد */
        .challenge-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; border: none; padding: 10px 15px; border-radius: 12px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;
            font-size: 13px;
        }

        .notif-dot { 
            position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; 
            background: var(--danger); border-radius: 50%; border: 2px solid #fff; 
            display: none; z-index: 10; animation: pulse-dot 1.2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .chat-icon-btn {
            position: relative; background: rgba(255,255,255,0.05);
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }

        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input { 
            width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.6); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; 
        }
        input:focus { border-color: var(--primary); }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: #1e293b; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; position: relative; line-height: 1.5; }
        .msg.sent { background: var(--wa-sent); align-self: flex-start; border-bottom-right-radius: 4px; color: white; }
        .msg.received { background: var(--wa-received); align-self: flex-end; border-bottom-left-radius: 4px; color: #e2e8f0; }

        .new-messages-separator {
            display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--danger); font-size: 11px; font-weight: 800; letter-spacing: 1px;
        }
        .new-messages-separator::before, .new-messages-separator::after { content: ''; flex: 1; border-bottom: 1px solid rgba(244, 63, 94, 0.3); margin: 0 10px; }

        .challenge-card { 
            background: rgba(255,255,255,0.03); border-right: 4px solid var(--primary); 
            padding: 15px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .challenge-card:hover { background: rgba(255,255,255,0.07); transform: translateX(-5px); }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--bg-body); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:380px; text-align:center; border: 1px solid rgba(99, 102, 241, 0.3);">
            <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
            <h2 style="color:var(--primary); margin-top:0;">تأكيد الهوية</h2>
            <p style="font-size:13px; opacity:0.7; margin-bottom:20px;">يرجى إدخال اسمك الحقيقي ورقم هاتفك للوصول إلى الساحة</p>
            <input type="text" id="setupName" placeholder="الاسم الكامل (مثال: أحمد محمد)">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف (01...)">
            <button onclick="confirmInitialData()" class="main-btn">تأكيد البيانات والدخول 🔓</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:40px 0;">
            <div style="font-size:32px; font-weight:900; background: linear-gradient(to left, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ساحة الأصدقاء</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-weight:600;"></div>
        </div>
        
        <button class="main-btn" onclick="showSection('friendsPage')" style="margin-bottom:20px; height: 80px;">
            <div id="mainMenuDot" class="notif-dot" style="top: 15px; right: 15px;"></div>
            <i class="fas fa-swords" style="font-size:24px;"></i> 
            <span style="font-size:18px;">تحدي الأصدقاء</span>
        </button>

        <button class="main-btn" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); height: 70px;" onclick="showSection('selfChallengePage')">
            <i class="fas fa-user-ninja"></i> تدريب فردي
        </button>

        <button onclick="window.location.href='dash_boared.html'" style="background:none; border:none; color:#64748b; margin-top:30px; width:100%; cursor:pointer; font-weight:600;">
            <i class="fas fa-door-open"></i> خروج للمنصة الرئيسية
        </button>
    </div>

    <div id="selfChallengePage" class="sub-page">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
            <i class="fas fa-chevron-right" onclick="showSection('mainMenu')" style="cursor:pointer; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;"></i>
            <h3 style="margin:0;">تحديات التدريب 🏆</h3>
        </div>
        <div id="selfChallengesList"></div>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; font-weight:bold;"><i class="fas fa-chevron-right"></i> عودة</div>
            <button class="refresh-btn" onclick="fetchFriendsData()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">
                <i class="fas fa-sync-alt" id="syncIcon"></i> تحديث
            </button>
        </div>
        
        <div class="card">
            <h4 style="margin-top:0;"><i class="fas fa-user-plus"></i> إضافة صديق جديد</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="رقم هاتف الصديق" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--accent); width:55px; border-radius:14px; border:none; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; padding:15px; background:rgba(16, 185, 129, 0.1); border-radius:15px; text-align:center;">
                <p id="foundName" style="margin:0 0 10px 0; font-weight:bold; color:var(--accent);"></p>
                <button id="requestBtn" onclick="sendFriendRequest()" class="main-btn" style="padding:10px;">إرسال طلب ➕</button>
            </div>
        </div>

        <h4 style="color:var(--primary);"><i class="fas fa-envelope-open-text"></i> طلبات الصداقة</h4>
        <div id="receivedList"></div>

        <h4 style="color:var(--accent);"><i class="fas fa-users"></i> الأصدقاء المتصلون</h4>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-chevron-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <div style="flex:1;">
                <div id="chatFriendName" style="font-weight:bold;">...</div>
                <div style="font-size:11px; color:var(--accent);">متصل الآن</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area" style="padding:15px; background:#1e293b; display:flex; gap:10px;">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." style="margin:0; flex:1; background:#0f172a; border:none; border-radius:30px;">
            <button onclick="sendChatMessage()" style="background:var(--primary); width:50px; height:50px; border-radius:50%; border:none; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbxo66cbciY4-vFTyi8LG8lAtd0TvAyM0gcYUslNuuVjDnMR6RgUwOnq0e8dSGqexOb_/exec";
        
        let isChatOpen = false;
        let currentChatPhone = null;
        let lastMsgCount = 0;
        let syncInterval = null;
        let msgMemory = JSON.parse(localStorage.getItem('msgMemory')) || {};

        // 1. نظام تأكيد البيانات الجديد
        function confirmInitialData() {
            const name = document.getElementById('setupName').value.trim();
            const phone = document.getElementById('setupPhone').value.trim();

            if (name.length < 3 || phone.length < 10) {
                return Swal.fire('خطأ', 'يرجى إدخال اسم ورقم هاتف صحيح', 'error');
            }

            // المرحلة الثانية: التأكيد النهائي
            Swal.fire({
                title: 'هل تريد التأكيد؟',
                html: `الاسم: <b>${name}</b><br>الرقم: <b>${phone}</b><br><br><span style="color:red; font-size:13px;">تنبيه: بعد الضغط على موافق لن تتمكن من تغيير هذه البيانات نهائياً.</span>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، هذه بياناتي الصحيحة',
                cancelButtonText: 'تعديل',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.setItem('appUser', JSON.stringify({ name, phone }));
                    initApp();
                }
            });
        }

        // 2. نظام التحدي بين الأصدقاء
        async function challengeFriend(friendPhone, friendName) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            Swal.fire({
                title: 'بدء تحدي ⚔️',
                text: `هل تريد إرسال طلب تحدي إلى ${friendName}؟`,
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'إرسال الطلب',
                cancelButtonText: 'إلغاء'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // إرسال رسالة مخفية كطلب تحدي
                        await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${friendPhone}&text=CHALLENGE_INVITE_FROM:${user.name}`);
                        Swal.fire('تم الإرسال', 'سيظهر طلبك لدى الصديق فوراً', 'success');
                    } catch(e) { Swal.fire('فشل', 'حدث خطأ في الإرسال', 'error'); }
                }
            });
        }

        // 3. المزامنة والتحقق من التحديات الواردة
        function startGlobalSync() {
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                const user = JSON.parse(localStorage.getItem('appUser'));
                if(!user || isChatOpen) return;
                
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                    const data = await res.json();
                    
                    // التحقق من وجود رسالة تحدي في آخر الرسائل
                    data.friends.forEach(f => {
                        // إذا كانت عدد الرسائل زاد، نفحص آخر رسالة
                        if(f.lastMsg && f.lastMsg.includes("CHALLENGE_INVITE_FROM:") && !msgMemory[f.phone + '_challenged']) {
                            const challenger = f.lastMsg.split(":")[1];
                            msgMemory[f.phone + '_challenged'] = true; // لمنع تكرار التنبيه
                            localStorage.setItem('msgMemory', JSON.stringify(msgMemory));
                            
                            Swal.fire({
                                title: 'تحدي جديد! ⚔️',
                                text: `يريد صديقك ${challenger} تحديك الآن!`,
                                icon: 'warning',
                                showCancelButton: true,
                                confirmButtonText: 'قبول',
                                cancelButtonText: 'رفض',
                                background: '#1e293b',
                                color: '#fff'
                            }).then(res => {
                                if(res.isConfirmed) Swal.fire('جاهز؟', 'سيتم تحويلك لساحة القتال قريباً', 'success');
                            });
                        }
                    });

                    renderFriends(data);
                } catch(e) {}
            }, 3000);
        }

        // --- باقي وظائف النظام الأساسية (تم تكييفها مع الثيم الجديد) ---

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user) {
                document.getElementById('setupOverlay').style.display = 'none';
                document.getElementById('welcomeUser').innerText = `أهلاً يا ${user.name.split(' ')[0]} 🔥`;
                showSection('mainMenu');
                startGlobalSync();
                loadSelfChallenges();
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function renderFriends(data) {
            const list = document.getElementById('friendsList');
            const rec = document.getElementById('receivedList');

            list.innerHTML = data.friends.map(f => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                    <b style="font-size:16px;">${f.name}</b>
                    <div style="display:flex; gap:10px;">
                        <button class="challenge-btn" onclick="challengeFriend('${f.phone}', '${f.name}')">تحدي ⚔️</button>
                        <div class="chat-icon-btn" onclick="openChat('${f.name}', '${f.phone}')">
                            <div id="dot-${f.phone}" class="notif-dot" style="${(f.msgCount > (msgMemory[f.phone]||0))?'display:block':''}"></div>
                            <i class="fas fa-comment-alt"></i>
                        </div>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء حالياً</p>';

            rec.innerHTML = data.received.map(r => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${r.name}</b></span>
                    <div style="display:flex; gap:5px;">
                        <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); border:none; color:white; padding:8px 12px; border-radius:10px;">قبول</button>
                        <button onclick="respond('${r.phone}', 'reject')" style="background:var(--danger); border:none; color:white; padding:8px 12px; border-radius:10px;">رفض</button>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.3;">لا توجد طلبات معلقة</p>';
        }

        async function searchFriend() {
            const p = document.getElementById('friendPhone').value.trim();
            if(!p) return;
            Swal.showLoading();
            try {
                const res = await fetch(`${SCRIPT_URL}?action=search&phone=${p}`);
                const data = await res.json();
                Swal.close();
                if(data.found) {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.name;
                    window.searchedPhone = p;
                } else { Swal.fire('عذراً', 'الرقم غير مسجل في الساحة', 'info'); }
            } catch(e) { Swal.close(); }
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                await fetch(`${SCRIPT_URL}?action=request&from=${user.phone}&to=${window.searchedPhone}`);
                Swal.fire('تم', 'تم إرسال طلب الصداقة', 'success');
                document.getElementById('searchResult').style.display = 'none';
            } catch(e) {}
        }

        async function openChat(name, phone) {
            isChatOpen = true;
            currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            loadMessages();
            window.chatInt = setInterval(loadMessages, 2500);
        }

        async function loadMessages() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${currentChatPhone}`);
                const data = await res.json();
                
                let html = "";
                data.messages.forEach(m => {
                    const isMe = String(m.sender) === String(user.phone);
                    html += `<div class="msg ${isMe?'sent':'received'}">${m.text}</div>`;
                });
                document.getElementById('chatMsgs').innerHTML = html;
                const container = document.getElementById('chatMsgs');
                container.scrollTop = container.scrollHeight;
                
                msgMemory[currentChatPhone] = data.messages.length;
                localStorage.setItem('msgMemory', JSON.stringify(msgMemory));
            } catch(e) {}
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim()) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            const txt = inp.value;
            inp.value = "";
            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${currentChatPhone}&text=${encodeURIComponent(txt)}`);
                loadMessages();
            } catch(e) {}
        }

        function closeChat() {
            isChatOpen = false;
            document.getElementById('chatPage').style.display = 'none';
            clearInterval(window.chatInt);
        }

        function loadSelfChallenges() {
            const challenges = [
                { id: 1, title: 'تحدي الكتابة السريعة', desc: 'اكتب جملة طويلة في 5 ثوانٍ' },
                { id: 2, title: 'تحدي الذاكرة', desc: 'تذكر 10 أرقام عشوائية' },
                { id: 3, title: 'تحدي النينجا', desc: 'اختبر سرعة رد فعلك' }
            ];
            document.getElementById('selfChallengesList').innerHTML = challenges.map(c => `
                <div class="challenge-card" onclick="Swal.fire('${c.title}', 'بدء التحدي قريباً...', 'info')">
                    <b>${c.title}</b>
                    <p style="font-size:12px; opacity:0.6; margin:5px 0 0;">${c.desc}</p>
                </div>
            `).join('');
        }

        initApp();
    </script>
</body>
</html>
