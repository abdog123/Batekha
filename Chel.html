<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة التحدي 🔥 - النسخة الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire-bg: #0a0a0a; --orange: #ff4d00; --yellow: #ffae00; --accent: #2ed573; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fire-bg); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }

        .sub-page { display: none; animation: fadeIn 0.3s ease; }
        .active-section { display: block; }
        
        .fire-title { font-size: 28px; font-weight: 900; text-align: center; margin: 20px 0; background: linear-gradient(#fff, var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* الأزرار الرئيسية */
        .menu-grid { display: grid; gap: 15px; margin-top: 30px; }
        .main-btn { background: rgba(255,255,255,0.05); border: 2px solid var(--orange); padding: 25px; border-radius: 20px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* نظام الأصدقاء */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #1a1f2e; color: white; font-size: 12px; }
        .tab-btn.active { background: var(--orange); }
        
        .card { background: #1a1f2e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 4px solid var(--orange); position: relative; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .online { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .offline { background: #555; }

        .back-nav { color: var(--yellow); cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="challengeMenu" class="sub-page active-section">
        <div class="fire-title">ساحة التحدي 🔥</div>
        <div class="menu-grid">
            <button class="main-btn" onclick="showSection('friendsPage')"><i class="fas fa-users"></i> الأصدقاء والطلبات</button>
            <button class="main-btn" onclick="showSection('selfPage')"><i class="fas fa-fist-raised"></i> تحديات النفس (50+)</button>
            <button class="main-btn" onclick="window.location.href='index.html'" style="border-color:#444; margin-top:20px; font-size:14px;"><i class="fas fa-home"></i> العودة للمنصة</button>
        </div>
    </div>

    <div id="friendsPage" class="sub-page">
        <div class="back-nav" onclick="showSection('challengeMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('myFriends')">أصدقائي</button>
            <button class="tab-btn" onclick="switchTab('pendingReq')">طلبات مبعوثة</button>
            <button class="tab-btn" onclick="switchTab('addFriend')">إضافة صديق</button>
        </div>

        <div id="myFriends" class="tab-content">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span><span class="status-dot online"></span> أحمد محمد</span>
                    <button onclick="sendChallenge('أحمد')" style="background:var(--accent); border:none; padding:5px 10px; border-radius:5px; font-size:12px;">تحدي</button>
                </div>
            </div>
        </div>

        <div id="addFriend" class="tab-content" style="display:none;">
            <div class="card">
                <input type="tel" id="friendPhone" placeholder="ادخل رقم هاتف الصديق..." style="width:100%; padding:12px; border-radius:10px; border:none; background:#0a0a0a; color:white; margin-bottom:10px;">
                <button class="main-btn" style="width:100%; padding:10px; font-size:14px;" onclick="sendFriendRequest()">إرسال طلب صداقة</button>
            </div>
        </div>

        <div id="pendingReq" class="tab-content" style="display:none;">
            <p style="text-align:center; opacity:0.5;">لا توجد طلبات معلقة حالياً</p>
        </div>
    </div>

    <div id="selfPage" class="sub-page">
        <div class="back-nav" onclick="showSection('challengeMenu')"><i class="fas fa-arrow-right"></i> رجوع</div>
        
        <h3 style="color:var(--yellow)">تحدي اليوم المتغير 📅</h3>
        <div class="card" id="dailyChallengeCard">
            <h4 id="challengeTitle">تحميل التحدي...</h4>
            <p id="challengeDesc" style="font-size:14px; opacity:0.8;"></p>
            <button class="main-btn" style="width:100%; padding:10px; font-size:14px; border-color:var(--accent);" onclick="startChallengeAction()">ابدأ التحدي الآن</button>
        </div>

        <div class="card" style="border-color:var(--yellow)">
            <h4>تحدي السرعة الصاعق ⚡</h4>
            <p style="font-size:13px;">خلص قائمة مهامك كاملة في أقل من 40 دقيقة.</p>
            <button onclick="window.location.href='index.html?action=tasks'" style="background:none; border:1px solid var(--yellow); color:white; padding:8px; border-radius:8px; width:100%;">فتح المهام</button>
        </div>
    </div>

    <script>
        // مصفوفة الـ 50 تحدي
        const challenges = [
            { title: "تركيز الرهبان 🧘", desc: "ذاكر لمدة 50 دقيقة بدون لمس الموبايل نهائياً." },
            { title: "سرعة البرق ⚡", desc: "حل 15 سؤال في مادة التخصص في 10 دقائق." },
            { title: "تحدي القرآن 📖", desc: "اقرأ حزب كامل قبل البدء في المذاكرة." },
            { title: "عدو التشتت 🚫", desc: "اغلق إشعارات كل التطبيقات لمدة 4 ساعات." },
            { title: "الذاكرة الحديدية 🧠", desc: "لخص درساً كاملاً في صفحة واحدة فقط من الذاكرة." },
            // ... يمكنك إضافة حتى 50 تحدي هنا
        ];

        // اختيار تحدي بناءً على تاريخ اليوم
        function loadDailyChallenge() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const challengeIndex = dayOfYear % challenges.length;
            const daily = challenges[challengeIndex];
            
            document.getElementById('challengeTitle').innerText = daily.title;
            document.getElementById('challengeDesc').innerText = daily.desc;
        }

        // إظهار وإخفاء الأقسام
        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            if(id === 'selfPage') loadDailyChallenge();
        }

        // التبديل بين تبويبات الأصدقاء
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.target.classList.add('active');
        }

        // نظام الأصدقاء (محاكاة الربط بالشيت)
        function sendFriendRequest() {
            const phone = document.getElementById('friendPhone').value;
            if(phone.length < 10) {
                Swal.fire('خطأ', 'ادخل رقم هاتف صحيح', 'error');
                return;
            }
            // هنا يتم إرسال البيانات لـ Google Sheets عبر API
            Swal.fire('تم الإرسال', `تم إرسال طلب صداقة للرقم ${phone}`, 'success');
            document.getElementById('pendingReq').innerHTML = `<div class="card">طلب مبعوث إلى: ${phone} <span style="font-size:10px; color:var(--yellow)">(قيد الانتظار)</span></div>`;
        }

        function startChallengeAction() {
            Swal.fire({
                title: 'تفعيل التحدي؟',
                text: 'سيتم نقلك للعداد لبدء تنفيذ تحدي اليوم',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'يلا بينا'
            }).then(r => {
                if(r.isConfirmed) window.location.href = 'index.html?startTimer=true';
            });
        }

        window.onload = loadDailyChallenge;
    </script>
</body>
</html>
