<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #3498db; --dark: #0f172a; --accent: #2ed573; 
            --card: rgba(255,255,255,0.08); --wa-bg: #0b141a;
            --wa-sent: #005c4b; --wa-received: #202c33;
            --danger: #ff4757;
        }
        
        body { 
            background: var(--dark); color: #fff; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
        }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); position: relative; }
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; border:none; cursor:pointer; position: relative; margin-bottom: 10px;}
        .main-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .notif-dot { 
            position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; 
            background: var(--danger); border-radius: 50%; border: 2px solid #fff; 
            display: none; z-index: 10;
            box-shadow: 0 0 8px var(--danger);
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .new-messages-separator {
            display: flex; align-items: center; text-align: center; margin: 20px 0;
            color: var(--danger); font-size: 12px; font-weight: bold;
        }
        .new-messages-separator::before, .new-messages-separator::after {
            content: ''; flex: 1; border-bottom: 1px solid var(--danger); opacity: 0.5;
        }
        .new-messages-separator:not(:empty)::before { margin-left: .5em; }
        .new-messages-separator:not(:empty)::after { margin-right: .5em; }

        .chat-icon-btn {
            position: relative; background: rgba(255,255,255,0.1);
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .chat-icon-btn:hover { background: var(--primary); }
        
        .challenge-icon-btn {
            background: linear-gradient(45deg, #e67e22, #d35400);
            padding: 8px 12px; border-radius: 10px; color: white;
            border: none; font-weight: bold; cursor: pointer; font-size: 13px;
        }

        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 12px 15px; background: #202c33; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 6px; background-color: #0b141a; }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; position: relative; color: #e9edef; line-height: 1.5; }
        .msg.sent { background: var(--wa-sent); align-self: flex-start; border-top-right-radius: 0; }
        .msg.received { background: var(--wa-received); align-self: flex-end; border-top-left-radius: 0; }
        
        .msg-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .status-tick { font-size: 11px; }

        .chat-input-area { padding: 10px; display: flex; gap: 8px; background: #202c33; align-items: center; }
        #chatInput { background: #2a3942; border: none; margin: 0; flex: 1; border-radius: 25px; padding: 12px 20px; color: white; }
        .send-btn { background: #00a884; width: 45px; height: 45px; border-radius: 50%; color: white; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .searching-text { text-align: center; color: var(--primary); font-size: 14px; padding: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        .refresh-btn { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        .challenge-card { background: rgba(255,255,255,0.05); border-left: 4px solid var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .challenge-card:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">تأكيد الهوية 🍉</h2>
            <p style="font-size: 14px; opacity: 0.8;">يرجى إدخال اسمك ورقمك المسجل بدقة</p>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف (01...)">
            <button onclick="saveAndLock()" class="main-btn">تأكيد البيانات ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:40px 0;">
            <div style="font-size:28px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-size:18px;"></div>
        </div>
        
        <button class="main-btn" onclick="showSection('friendsPage')">
            <div id="mainMenuDot" class="notif-dot" style="top: 10px; right: 10px;"></div>
            <i class="fas fa-user-friends"></i> تحدي مع صديقك
        </button>

        <button class="main-btn" style="background: linear-gradient(45deg, #e67e22, #d35400);" onclick="showSection('selfChallengePage')">
            <i class="fas fa-trophy"></i> تحدي نفسك (معكش صديق)
        </button>

        <button onclick="window.location.href='dash_boared.html'" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:#ccc; margin-top:20px; width:100%; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;">
            <i class="fas fa-home"></i> العودة للمنصة الرئيسية
        </button>
    </div>

    <div id="selfChallengePage" class="sub-page">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <i class="fas fa-arrow-right" onclick="showSection('mainMenu')" style="cursor:pointer; font-size:20px;"></i>
            <h3 style="margin:0; color:var(--primary);">تحديات فردية 🏆</h3>
        </div>
        
        <div class="challenge-card" onclick="startChallenge('challenge1')">
            <b>1. تحدي سرعة الكتابة ⌨️</b>
            <p style="font-size:12px; color:#aaa; margin:5px 0 0;">اكتب الجملة المطلوبة في أقل من 10 ثواني!</p>
        </div>
        </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; font-weight:bold;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <button class="refresh-btn" onclick="fetchFriendsData()">
                <i class="fas fa-sync-alt" id="syncIcon"></i> تحديث البيانات
            </button>
        </div>
        
        <div class="card">
            <h4><i class="fas fa-search"></i> ابحث عن صديق برقم الهاتف</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="01xxxxxxxxx" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--primary); padding:0 15px; border-radius:12px; border:none; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; text-align:center;">
                <p id="foundName" style="color:var(--accent); font-weight:bold;"></p>
                <button id="requestBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب صداقة ➕</button>
            </div>
        </div>

        <h4 style="color:var(--primary);">طلبات الصداقة المستلمة</h4>
        <div id="receivedList"></div>

        <h4 style="color:var(--accent);">أصدقائي</h4>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <span id="chatFriendName" style="font-weight:bold; font-size:17px; flex:1;">...</span>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." autocomplete="off">
            <button onclick="sendChatMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbxo66cbciY4-vFTyi8LG8lAtd0TvAyM0gcYUslNuuVjDnMR6RgUwOnq0e8dSGqexOb_/exec";
        
        let chatInterval = null;
        let globalSyncInterval = null;
        let lastMsgCount = 0;
        let isChatOpen = false;
        let isFirstEntry = true;
        
        let msgMemory = JSON.parse(localStorage.getItem('msgMemory')) || {};
        let friendsCache = JSON.parse(localStorage.getItem('friendsCache')) || { friends: [], received: [] };
        let chatCache = JSON.parse(localStorage.getItem('chatCache')) || {};

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                showSection(localStorage.getItem('lastPage') || 'mainMenu');
                document.getElementById('welcomeUser').innerText = `أهلاً بك، ${user.name} 🍉`;
                startGlobalSync();
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        function startGlobalSync() {
            if(globalSyncInterval) clearInterval(globalSyncInterval);
            globalSyncInterval = setInterval(async () => {
                const user = JSON.parse(localStorage.getItem('appUser'));
                if(!user || isChatOpen) return;
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                    const data = await res.json();
                    
                    // فحص إذا كان هناك تحدي مرسل إليك
                    if(data.incomingChallenge) {
                        handleIncomingChallenge(data.incomingChallenge);
                    }

                    let totalNewMsgs = false;
                    data.friends.forEach(f => {
                        const count = f.msgCount || 0;
                        const savedCount = msgMemory[f.phone] || 0;
                        if(count > savedCount) totalNewMsgs = true;
                        const dot = document.getElementById(`dot-${f.phone}`);
                        if(dot) dot.style.display = (count > savedCount) ? 'block' : 'none';
                    });
                    
                    const hasReq = data.received && data.received.length > 0;
                    const mainMenuDot = document.getElementById('mainMenuDot');
                    if(mainMenuDot) mainMenuDot.style.display = (totalNewMsgs || hasReq) ? 'block' : 'none';
                } catch(e) {}
            }, 2500); 
        }

        async function requestChallenge(friendPhone, friendName) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            Swal.fire({ title: 'إرسال تحدي', text: `هل تريد تحدي ${friendName}؟`, icon: 'question', showCancelButton: true, confirmButtonText: 'نعم، أرسل' })
            .then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${friendPhone}&text=${encodeURIComponent('INVITE_CHALLENGE:' + user.name)}`);
                        Swal.fire('تم الإرسال', 'انتظر قبول الصديق للتحدي', 'success');
                    } catch(e) { Swal.fire('خطأ', 'فشل إرسال التحدي', 'error'); }
                }
            });
        }

        function handleIncomingChallenge(challengerName) {
            Swal.fire({
                title: 'تحدي جديد! ⚔️',
                text: `يريد صديقك ${challengerName} تحديك، هل تقبل؟`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2ed573',
                cancelButtonColor: '#ff4757',
                confirmButtonText: 'قبول التحدي',
                cancelButtonText: 'رفض'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire('بدأ التحدي!', 'سيتم توجيهك قريباً', 'success');
                    // هنا يمكن إضافة كود فتح صفحة تحدي مشتركة
                }
            });
        }

        function renderFriends(data) {
            const friendsList = document.getElementById('friendsList');
            const receivedList = document.getElementById('receivedList');

            friendsList.innerHTML = data.friends.map(f => {
                const hasNew = (f.msgCount || 0) > (msgMemory[f.phone] || 0);
                return `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px;">
                    <b style="flex:1;">${f.name}</b>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="challenge-icon-btn" onclick="requestChallenge('${f.phone}', '${f.name}')">تحدي ⚔️</button>
                        <div class="chat-icon-btn" onclick="openChat('${f.name}', '${f.phone}')">
                            <div id="dot-${f.phone}" class="notif-dot" style="${hasNew ? 'display:block' : 'none'}"></div>
                            <i class="fas fa-comment-dots" style="font-size:20px;"></i>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء</p>';

            receivedList.innerHTML = data.received.map(r => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                    <span style="flex:1;"><b>${r.name}</b></span>
                    <button id="acceptBtn-${r.phone}" onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); color:black; padding:6px 15px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;">قبول</button>
                    <button id="rejectBtn-${r.phone}" onclick="respond('${r.phone}', 'reject')" style="background:var(--danger); color:white; padding:6px 15px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;">رفض</button>
                </div>`).join('') || '<p style="text-align:center; opacity:0.3;">لا توجد طلبات</p>';
        }

        function saveAndLock() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'يرجى إدخال بيانات صحيحة', 'error');

            Swal.fire({
                title: 'تأكيد نهائي 🛑',
                html: `هل أنت متأكد من البيانات؟<br><br><b>الاسم:</b> ${n}<br><b>الرقم:</b> ${p}<br><br><small style="color:red">ملاحظة: لا يمكن تغيير هذه البيانات لاحقاً</small>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'تأكيد ومتابعة',
                cancelButtonText: 'تعديل'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
                    initApp();
                }
            });
        }

        // الوظائف المساعدة (البحث، الإرسال، المراسلة) تبقى كما هي من الكود الأصلي لضمان الاستقرار
        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const syncIcon = document.getElementById('syncIcon');
            if(syncIcon) syncIcon.classList.add('fa-spin');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                friendsCache = data;
                localStorage.setItem('friendsCache', JSON.stringify(data));
                renderFriends(data);
                if(syncIcon) syncIcon.classList.remove('fa-spin');
            } catch(e) { if(syncIcon) syncIcon.classList.remove('fa-spin'); }
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            localStorage.setItem('lastPage', id);
            if(id === 'friendsPage') { renderFriends(friendsCache); fetchFriendsData(); }
        }

        async function openChat(name, phone) {
            isChatOpen = true; isFirstEntry = true;
            window.currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            document.getElementById('chatMsgs').innerHTML = '<div class="searching-text">جاري التحميل...</div>';
            loadMessages();
            chatInterval = setInterval(loadMessages, 2500);
        }

        async function loadMessages() {
            if(!isChatOpen) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            const phone = window.currentChatPhone;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${phone}`);
                const data = await res.json();
                if (data.messages.length !== lastMsgCount) {
                    renderMessages(data.messages);
                    lastMsgCount = data.messages.length;
                    msgMemory[phone] = data.messages.length;
                    localStorage.setItem('msgMemory', JSON.stringify(msgMemory));
                    isFirstEntry = false;
                }
            } catch(e) {}
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMsgs');
            const user = JSON.parse(localStorage.getItem('appUser'));
            let html = "";
            messages.forEach((m, index) => {
                const isMe = String(m.sender) === String(user.phone);
                html += `<div class="msg ${isMe ? 'sent' : 'received'}">${m.text}<div class="msg-info"><span>${m.time || ''}</span></div></div>`;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if(!text) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            inp.value = '';
            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
                loadMessages();
            } catch(e) {}
        }

        function closeChat() { isChatOpen = false; document.getElementById('chatPage').style.display = 'none'; clearInterval(chatInterval); fetchFriendsData(); }

        initApp();
    </script>
</body>
</html>
