<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة التحدي 🍉</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #0f121d; --card-bg: #1a1f2e; --accent: #2ed573; --primary: #764ba2; --text: #ffffff; }
        body { background: var(--main-bg); color: var(--text); margin: 0; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 12px; cursor: pointer; text-decoration: none; font-size: 14px; }
        
        .search-box { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .search-box input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #0f121d; color: white; margin-bottom: 10px; outline: none; }
        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }

        .section-title { font-size: 16px; color: var(--accent); margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
        
        .user-card { background: var(--card-bg); padding: 15px; border-radius: 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .btn-small { padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; }
        .btn-accept { background: var(--accent); color: #000; }
        .btn-reject { background: #ff4757; color: #fff; margin-right: 5px; }

        #loading { text-align: center; display: none; margin: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">ساحة التحدي 🔥</h2>
        <a href="dash_boared.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
    </div>

    <div class="search-box">
        <input type="tel" id="searchPhone" placeholder="اكتب رقم هاتف صديقك لتبحث عنه...">
        <button class="btn-action" onclick="searchForFriend()">بحث عن صديق 🔍</button>
    </div>

    <div id="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>

    <div id="searchResult"></div>

    <div class="section-title"><i class="fas fa-user-plus"></i> طلبات بانتظار قبولك</div>
    <div id="requestsList"></div>

    <div class="section-title"><i class="fas fa-users"></i> أصدقائي</div>
    <div id="friendsList"></div>

    <script>
        // ضع الرابط الخاص بك هنا
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";

        // التأكد من وجود بيانات المستخدم
        const activeUser = JSON.parse(localStorage.getItem('activeStudent'));
        if (!activeUser) {
            window.location.href = 'index.html';
        }

        async function searchForFriend() {
            const phone = document.getElementById('searchPhone').value;
            if(!phone) return;

            showLoading(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=searchUser&phone=${phone}`);
                const data = await res.json();
                
                const resultDiv = document.getElementById('searchResult');
                if(data.status === 'success') {
                    resultDiv.innerHTML = `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="user-avatar">${data.user.name[0]}</div>
                                <div><b>${data.user.name}</b><br><small>${data.user.phone}</small></div>
                            </div>
                            <button class="btn-small btn-accept" onclick="sendFriendRequest('${data.user.phone}')">إضافة +</button>
                        </div>
                    `;
                } else {
                    Swal.fire('لم نجد أحداً!', 'تأكد من أن الرقم مسجل في المنصة', 'info');
                    resultDiv.innerHTML = '';
                }
            } catch(e) {
                console.error(e);
            }
            showLoading(false);
        }

        async function sendFriendRequest(targetPhone) {
            try {
                await fetch(`${SCRIPT_URL}?action=addFriend&sender=${activeUser.phone}&receiver=${targetPhone}`);
                Swal.fire('تم الإرسال!', 'بانتظار قبول صديقك للطلب', 'success');
                document.getElementById('searchResult').innerHTML = '';
            } catch(e) { alert("حدث خطأ"); }
        }

        async function loadFriendsData() {
            showLoading(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${activeUser.phone}`);
                const data = await res.json();

                // عرض طلبات الصداقة الواردة
                const reqArea = document.getElementById('requestsList');
                reqArea.innerHTML = data.received.length > 0 ? data.received.map(req => `
                    <div class="user-card">
                        <div class="user-info"><b>${req.name}</b></div>
                        <div>
                            <button class="btn-small btn-accept" onclick="respond('${req.phone}', 'accept')">قبول</button>
                            <button class="btn-small btn-reject" onclick="respond('${req.phone}', 'reject')">رفض</button>
                        </div>
                    </div>
                `).join('') : '<p style="opacity:0.5; font-size:13px;">لا توجد طلبات حالياً</p>';

                // عرض قائمة الأصدقاء
                const friendsArea = document.getElementById('friendsList');
                friendsArea.innerHTML = data.friends.length > 0 ? data.friends.map(f => `
                    <div class="user-card">
                        <div class="user-info">
                            <div class="user-avatar" style="background:#2ecc71">${f.name[0]}</div>
                            <b>${f.name}</b>
                        </div>
                        <i class="fas fa-comment-dots" style="color:var(--accent); font-size:20px;"></i>
                    </div>
                `).join('') : '<p style="opacity:0.5; font-size:13px;">ابدأ بإضافة أصدقائك الآن!</p>';

            } catch(e) { console.log(e); }
            showLoading(false);
        }

        async function respond(targetPhone, status) {
            try {
                await fetch(`${SCRIPT_URL}?action=respondRequest&user=${activeUser.phone}&target=${targetPhone}&status=${status}`);
                loadFriendsData();
            } catch(e) { alert("حدث خطأ"); }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // تحميل البيانات عند فتح الصفحة
        window.onload = loadFriendsData;
    </script>
</body>
</html>
