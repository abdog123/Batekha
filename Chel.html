<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --dark: #0a0a0a; --accent: #2ed573; --card: rgba(255,255,255,0.08); }
        
        body { 
            background: var(--dark); color: #fff; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
        }

        .main-btn, button { transition: all 0.2s ease; cursor: pointer; border: none; outline: none; }
        .main-btn:active, button:active { transform: scale(0.95); opacity: 0.8; }
        .main-btn:hover { box-shadow: 0 0 15px rgba(52, 152, 219, 0.4); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: #161a26; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; position: relative; color: white; word-wrap: break-word; }
        .msg.sent { background: #056162; align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg.received { background: #262d31; align-self: flex-end; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 10px; display: flex; gap: 10px; background: #1e2428; align-items: center; }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">مرحباً بك في الساحة 🤝</h2>
            <p style="font-size:12px; color:#888;">سجل بياناتك لمرة واحدة فقط للبدء</p>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف">
            <button id="setupBtn" onclick="saveAndLock()" class="main-btn">دخول ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:40px 0;">
            <div style="font-size:28px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-size:18px;"></div>
        </div>
        <button class="main-btn" onclick="goToFriends()">
            <i class="fas fa-user-friends"></i> قائمة الأصدقاء والطلبات
        </button>
        <button onclick="window.location.href='dash_boared.html'" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:#ccc; margin-top:20px; width:100%; padding:15px; border-radius:15px; font-weight:bold;">
            <i class="fas fa-home"></i> العودة للمنصة الرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; padding:5px; font-weight:bold;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <button onclick="fetchFriendsData()" id="refreshBtn" style="background:var(--card); color:var(--accent); padding:8px 15px; border-radius:10px; border:1px solid var(--accent);">
                <i class="fas fa-sync-alt"></i> تحديث القائمة
            </button>
        </div>
        <div class="card">
            <h4><i class="fas fa-search"></i> ابحث عن صديق</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="أدخل رقم الهاتف" style="margin:0;">
                <button onclick="searchFriend()" id="searchBtn" style="background:var(--primary); padding:0 20px; border-radius:12px; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:20px; text-align:center; border-top:1px solid #333; padding-top:15px;">
                <p id="foundName" style="color:var(--accent); font-weight:bold; font-size:18px;"></p>
                <button id="sendReqBtn" onclick="sendFriendRequest()" class="main-btn">إرسال طلب صداقة ➕</button>
            </div>
        </div>
        <h4 style="color:var(--primary); margin-top:25px;">طلبات الصداقة</h4>
        <div id="receivedList"></div>
        <h4 style="color:var(--accent); margin-top:25px;">أصدقائي (اضغط للدردشة)</h4>
        <div id="friendsList"></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <span id="chatFriendName" style="font-weight:bold; font-size:18px;">الاسم</span>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالة محترمة..." style="margin:0;">
            <button onclick="sendChatMessage()" id="sendChatBtn" style="background:var(--accent); width:55px; height:48px; border-radius:15px; color:black; font-size:20px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";
        let chatInterval = null;
        let lastMsgCount = 0;
        let isChatOpen = false;

        function initApp() {
            // طلب إذن الإشعارات عند البدء
            if ("Notification" in window) {
                Notification.requestPermission();
            }

            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                const lastPage = localStorage.getItem('lastPage') || 'mainMenu';
                showSection(lastPage);
                if(lastPage === 'friendsPage') fetchFriendsData();
                document.getElementById('welcomeUser').innerText = `أهلاً بك، ${user.name} 🍉`;
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }
        initApp();

        function saveAndLock() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'يرجى إدخال بيانات صحيحة', 'error');
            localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
            initApp();
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            localStorage.setItem('lastPage', id);
        }

        function searchFriend() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            let p = document.getElementById('friendPhone').value.trim();
            if(p === user.phone) return Swal.fire('عفواً!', 'لا يمكنك إضافة نفسك يا بطل 🍉', 'warning');

            document.getElementById('searchBtn').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            fetch(`${SCRIPT_URL}?action=searchUser&phone=${p}`)
            .then(r => r.json()).then(data => {
                document.getElementById('searchBtn').innerHTML = '<i class="fas fa-search"></i>';
                if(data.status === 'success') {
                    document.getElementById('searchResult').style.display = 'block';
                    document.getElementById('foundName').innerText = data.user.name;
                    window.targetPhone = data.user.phone;
                } else { Swal.fire('غير موجود', 'هذا الرقم غير مسجل في المنصة', 'error'); }
            });
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const btn = document.getElementById('sendReqBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=addFriend&sender=${user.phone}&receiver=${window.targetPhone}`);
                const data = await res.json();
                if(data.status === 'success') {
                    Swal.fire('تم!', 'تم إرسال طلب الصداقة بنجاح', 'success');
                    document.getElementById('searchResult').style.display = 'none';
                } else { Swal.fire('تنبيه', data.message, 'info'); }
            } catch(e) { Swal.fire('خطأ', 'فشل الإرسال، حاول لاحقاً', 'error'); }
            btn.disabled = false; btn.innerHTML = 'إرسال طلب صداقة ➕';
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                document.getElementById('friendsList').innerHTML = data.friends.map(f => `
                    <div class="card" onclick="openChat('${f.name}', '${f.phone}')" style="display:flex; justify-content:space-between; align-items:center; border-right: 4px solid var(--accent);">
                        <span><i class="fas fa-user-circle"></i> ${f.name}</span>
                        <i class="fas fa-comment-dots" style="color:var(--primary); font-size:20px;"></i>
                    </div>
                `).join('') || '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء حالياً</p>';

                document.getElementById('receivedList').innerHTML = data.received.map(r => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${r.name} أرسل لك طلباً</span>
                        <div style="display:flex; gap:8px;">
                            <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); color:black; padding:5px 15px; border-radius:8px; font-weight:bold;">قبول</button>
                            <button onclick="respond('${r.phone}', 'reject')" style="background:#ff4757; color:white; padding:5px 15px; border-radius:8px; font-weight:bold;">رفض</button>
                        </div>
                    </div>
                `).join('') || '<p style="text-align:center; opacity:0.5;">لا توجد طلبات جديدة</p>';
            } catch(e) {}
        }

        async function respond(target, status) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=respondRequest&user=${user.phone}&target=${target}&status=${status}`);
            fetchFriendsData();
        }

        function openChat(name, phone) {
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            window.currentChatPhone = phone;
            isChatOpen = true;
            lastMsgCount = 0; // إعادة تعيين العداد لتحميل كل الرسائل
            document.getElementById('chatMsgs').innerHTML = ''; // مسح القديم
            loadMessages();
            chatInterval = setInterval(loadMessages, 500); 
        }

        async function loadMessages() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if(!window.currentChatPhone) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${window.currentChatPhone}`);
                const data = await res.json();
                const container = document.getElementById('chatMsgs');
                
                // منع "الوميض": نحدث الواجهة فقط إذا زاد عدد الرسائل
                if (data.messages.length > lastMsgCount) {
                    const newContent = data.messages.map(m => `
                        <div class="msg ${m.sender === user.phone ? 'sent' : 'received'}">${m.text}</div>
                    `).join('');
                    
                    container.innerHTML = newContent;
                    container.scrollTop = container.scrollHeight;

                    // نظام الإشعارات للرسائل المستلمة فقط
                    const lastMsg = data.messages[data.messages.length - 1];
                    if (lastMsg.sender !== user.phone && lastMsgCount > 0) {
                        showNotification(document.getElementById('chatFriendName').innerText, lastMsg.text);
                    }
                    lastMsgCount = data.messages.length;
                }
            } catch(e) {}
        }

        function showNotification(sender, text) {
            // إشعار داخل الويب (Toast)
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true
            });
            Toast.fire({ icon: 'info', title: `رسالة من ${sender}`, text: text });

            // إشعار خارج الويب (نظام)
            if (Notification.permission === "granted") {
                new Notification(`رسالة من ${sender}`, { body: text, icon: 'https://cdn-icons-png.flaticon.com/512/733/733585.png' });
            }
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            const user = JSON.parse(localStorage.getItem('appUser'));
            const text = inp.value.trim();
            if(!text) return;

            // إضافة فورية مع علامة "جاري الإرسال" (اختياري) لمنع الفجوة الزمنية
            const container = document.getElementById('chatMsgs');
            const tempMsg = document.createElement('div');
            tempMsg.className = 'msg sent';
            tempMsg.style.opacity = '0.7';
            tempMsg.innerText = text;
            container.appendChild(tempMsg);
            container.scrollTop = container.scrollHeight;
            
            inp.value = ''; 
            
            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
                // لا نحتاج لمسح الرسالة هنا، loadMessages سيعيد بناء الشات بالرسائل الحقيقية من السيرفر
            } catch(e) { 
                tempMsg.innerText += " (فشل الإرسال)";
                tempMsg.style.color = "red";
            }
        }

        function closeChat() {
            document.getElementById('chatPage').style.display = 'none';
            isChatOpen = false;
            clearInterval(chatInterval);
            window.currentChatPhone = null;
        }

        function goToFriends() { showSection('friendsPage'); fetchFriendsData(); }
    </script>
</body>
</html>
