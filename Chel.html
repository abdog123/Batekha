<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء - الثيم الجديد 💎</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #764ba2; --accent: #2ed573; --dark: #0f121d; --card: rgba(255,255,255,0.05); }
        body { background: var(--dark); color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; text-align: right; overflow-x: hidden; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ستايل الطلبات والاصدقاء الجديد */
        .card-pro { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .card-pro:active { transform: scale(0.98); }
        .avatar { width: 50px; height: 50px; background: linear-gradient(45deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* الشات المطور */
        #chatPage { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: #161a26; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 80%; }
        .msg-user-name { font-size: 11px; margin-bottom: 3px; color: var(--accent); font-weight: bold; padding: 0 5px; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .sent { align-self: flex-start; }
        .sent .msg-bubble { background: var(--primary); border-top-right-radius: 2px; }
        .received { align-self: flex-end; }
        .received .msg-bubble { background: #262d31; border-top-left-radius: 2px; }

        .chat-input { padding: 10px; background: #1e2428; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #2a2f32; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 20px; }
    </style>
</head>
<body>

    <div id="mainPage" class="page active-page">
        <h2 style="color: var(--accent);"><i class="fas fa-users"></i> ساحة الأصدقاء</h2>
        <div class="card-pro" onclick="openFriendsList()">
            <div class="avatar"><i class="fas fa-user-friends"></i></div>
            <div style="flex:1;"><b>قائمة الأصدقاء</b><br><small>تحدث مع أصدقائك الآن</small></div>
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="card-pro" onclick="window.location.href='dash_board.html'">
            <div class="avatar" style="background:#444;"><i class="fas fa-home"></i></div>
            <div style="flex:1;">العودة للمنصة الرئيسية</div>
        </div>
    </div>

    <div id="friendsListPage" class="page">
        <div onclick="showPage('mainPage')" style="padding:10px; cursor:pointer;"><i class="fas fa-arrow-right"></i> رجوع</div>
        <div id="friendsList">جاري التحميل...</div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()"></i>
            <span id="chatName">اسم الصديق</span>
        </div>
        <div class="chat-msgs" id="chatContainer"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك...">
            <div class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";
        let currentChatPhone = null;
        let chatInterval = null;

        // دالة حفظ واسترجاع الصفحة الحالية بعد إعادة التحميل
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            localStorage.setItem('lastPage_Chel', id);
            if(id === 'friendsListPage') fetchFriends();
        }

        // استرجاع الصفحة عند الفتح
        window.onload = () => {
            const last = localStorage.getItem('lastPage_Chel');
            if(last) showPage(last);
            
            // استرجاع الشات إذا كان مفتوحاً
            const lastChat = localStorage.getItem('activeChat');
            if(lastChat) {
                const data = JSON.parse(lastChat);
                openChat(data.name, data.phone);
            }
        };

        function openFriendsList() { showPage('friendsListPage'); }

        async function fetchFriends() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
            const data = await res.json();
            document.getElementById('friendsList').innerHTML = data.friends.map(f => `
                <div class="card-pro" onclick="openChat('${f.name}', '${f.phone}')">
                    <div class="avatar">${f.name[0]}</div>
                    <div style="flex:1;"><b>${f.name}</b></div>
                    <i class="fas fa-comment-dots" style="color:var(--accent);"></i>
                </div>
            `).join('');
        }

        function openChat(name, phone) {
            currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatName').innerText = name;
            localStorage.setItem('activeChat', JSON.stringify({name, phone}));
            loadMessages();
            chatInterval = setInterval(loadMessages, 1000); // تحديث كل 1 ثانية
        }

        function closeChat() {
            document.getElementById('chatPage').style.display = 'none';
            localStorage.removeItem('activeChat');
            clearInterval(chatInterval);
        }

        async function loadMessages() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${currentChatPhone}`);
                const data = await res.json();
                const container = document.getElementById('chatContainer');
                
                // جلب اسم الصديق
                const friendName = document.getElementById('chatName').innerText;

                container.innerHTML = data.messages.map(m => {
                    const isMe = m.sender === user.phone;
                    return `
                        <div class="msg-container ${isMe ? 'sent' : 'received'}">
                            <span class="msg-user-name">${isMe ? 'أنا' : friendName}</span>
                            <div class="msg-bubble">${m.text}</div>
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch(e) {}
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            if(!text) return;

            const user = JSON.parse(localStorage.getItem('appUser'));
            
            // تحديث لحظي (Optimistic UI)
            const container = document.getElementById('chatContainer');
            container.innerHTML += `
                <div class="msg-container sent">
                    <span class="msg-user-name">أنا</span>
                    <div class="msg-bubble">${text}</div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            inp.value = '';

            // إرسال للسيرفر
            await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${currentChatPhone}&text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
