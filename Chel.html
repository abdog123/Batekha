<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة الأصدقاء 🤝</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #3498db; --dark: #0a0a0a; --accent: #2ed573; 
            --card: rgba(255,255,255,0.08); --wa-bg: #0b141a;
            --wa-sent: #005c4b; --wa-received: #202c33;
        }
        
        body { 
            background: var(--dark); color: #fff; margin: 0; padding: 15px; 
            font-family: 'Segoe UI', sans-serif; text-align: right;
            overscroll-behavior-y: contain; overflow-x: hidden;
        }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .main-btn { background: linear-gradient(45deg, var(--primary), #2980b9); padding: 15px; border-radius: 15px; color: white; width: 100%; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; border:none; cursor:pointer;}
        
        .sub-page { display: none; max-width: 500px; margin: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }

        #chatPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 12px 15px; background: #202c33; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 6px; background-color: #0b141a; }
        
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; position: relative; color: #e9edef; line-height: 1.5; }
        .msg.sent { background: var(--wa-sent); align-self: flex-start; border-top-right-radius: 0; }
        .msg.received { background: var(--wa-received); align-self: flex-end; border-top-left-radius: 0; }
        
        .msg-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .status-tick { font-size: 11px; }

        .chat-input-area { padding: 10px; display: flex; gap: 8px; background: #202c33; align-items: center; }
        #chatInput { background: #2a3942; border: none; margin: 0; flex: 1; border-radius: 25px; padding: 12px 20px; }
        .send-btn { background: #00a884; width: 45px; height: 45px; border-radius: 50%; color: white; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .searching-text { text-align: center; color: var(--primary); font-size: 14px; padding: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="setupOverlay" style="display:none; position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center;">
            <h2 style="color:var(--primary);">مرحباً بك 🤝</h2>
            <input type="text" id="setupName" placeholder="الاسم الكامل">
            <input type="tel" id="setupPhone" placeholder="رقم الهاتف">
            <button onclick="saveAndLock()" class="main-btn">دخول ✅</button>
        </div>
    </div>

    <div id="mainMenu" class="sub-page">
        <div style="text-align:center; margin:40px 0;">
            <div style="font-size:28px; font-weight:bold; color:var(--primary);">ساحة الأصدقاء 🤝</div>
            <div id="welcomeUser" style="margin-top:10px; color:var(--accent); font-size:18px;"></div>
        </div>
        <button class="main-btn" onclick="goToFriends()">
            <i class="fas fa-user-friends"></i> قائمة الأصدقاء والطلبات
        </button>
        <button onclick="window.location.href='dash_boared.html'" style="background:rgba(255,255,255,0.05); border:1px solid #333; color:#ccc; margin-top:20px; width:100%; padding:15px; border-radius:15px; font-weight:bold; border:none; width:100%; cursor:pointer;">
            <i class="fas fa-home"></i> العودة للمنصة الرئيسية
        </button>
    </div>

    <div id="friendsPage" class="sub-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div onclick="showSection('mainMenu')" style="cursor:pointer; font-weight:bold;"><i class="fas fa-arrow-right"></i> رجوع</div>
            <span style="font-size: 14px; color: var(--accent);">الأصدقاء والطلبات</span>
        </div>
        
        <div class="card">
            <h4><i class="fas fa-search"></i> ابحث عن صديق</h4>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="friendPhone" placeholder="رقم الهاتف" style="margin:0;">
                <button onclick="searchFriend()" style="background:var(--primary); padding:0 15px; border-radius:12px; border:none; color:white;"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchResult" style="display:none; margin-top:15px; text-align:center;">
                <p id="foundName" style="color:var(--accent); font-weight:bold;"></p>
                <button onclick="sendFriendRequest()" class="main-btn">إرسال طلب صداقة ➕</button>
            </div>
        </div>

        <h4 style="color:var(--primary);">طلبات الصداقة</h4>
        <div id="receivedList"><div class="searching-text">جاري البحث عن طلبات...</div></div>

        <h4 style="color:var(--accent);">أصدقائي</h4>
        <div id="friendsList"><div class="searching-text">جاري البحث عن أصدقاء...</div></div>
    </div>

    <div id="chatPage">
        <div class="chat-header">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer; font-size:20px;"></i>
            <span id="chatFriendName" style="font-weight:bold; font-size:17px; flex:1;">...</span>
        </div>
        <div class="chat-messages" id="chatMsgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="اكتب رسالة..." autocomplete="off">
            <button onclick="sendChatMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";
        let chatInterval = null;
        let lastMsgCount = 0;
        let isChatOpen = false;

        function initApp() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (user && user.phone) {
                document.getElementById('setupOverlay').style.display = 'none';
                showSection(localStorage.getItem('lastPage') || 'mainMenu');
                document.getElementById('welcomeUser').innerText = `أهلاً بك، ${user.name} 🍉`;
            } else {
                document.getElementById('setupOverlay').style.display = 'flex';
            }
        }

        function saveAndLock() {
            const n = document.getElementById('setupName').value.trim();
            const p = document.getElementById('setupPhone').value.trim();
            if(n.length < 3 || p.length < 10) return Swal.fire('خطأ', 'بيانات غير صحيحة', 'error');
            localStorage.setItem('appUser', JSON.stringify({ name: n, phone: p }));
            initApp();
        }

        function showSection(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            localStorage.setItem('lastPage', id);
            if(id === 'friendsPage') fetchFriendsData();
        }

        async function fetchFriendsData() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                
                document.getElementById('friendsList').innerHTML = data.friends.map(f => `
                    <div class="card" onclick="openChat('${f.name}', '${f.phone}')" style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px; cursor:pointer;">
                        <b>${f.name}</b>
                        ${f.unread > 0 ? `<span style="background:red; padding:2px 8px; border-radius:10px; font-size:12px;">${f.unread}</span>` : '<i class="fas fa-chevron-left" style="opacity:0.3;"></i>'}
                    </div>
                `).join('') || '<p style="text-align:center; opacity:0.5;">لا يوجد أصدقاء حالياً</p>';

                document.getElementById('receivedList').innerHTML = data.received.map(r => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${r.name}</b></span>
                        <button onclick="respond('${r.phone}', 'accept')" style="background:var(--accent); color:black; padding:5px 12px; border-radius:8px; border:none; cursor:pointer;">قبول</button>
                    </div>
                `).join('') || '<p style="text-align:center; opacity:0.3;">لا توجد طلبات</p>';
            } catch(e) {}
        }

        async function openChat(name, phone) {
            isChatOpen = true;
            window.currentChatPhone = phone;
            document.getElementById('chatPage').style.display = 'flex';
            document.getElementById('chatFriendName').innerText = name;
            document.getElementById('chatMsgs').innerHTML = '<div class="searching-text">جاري تحميل الرسائل...</div>';
            lastMsgCount = 0;
            
            loadMessages();
            chatInterval = setInterval(loadMessages, 3000);
        }

        async function loadMessages() {
            if(!isChatOpen) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getMessages&user1=${user.phone}&user2=${window.currentChatPhone}`);
                const data = await res.json();
                
                // التحديث يتم فقط لو عدد الرسائل اتغير عشان ميحصلش فليكر (Flicker)
                if (data.messages.length > lastMsgCount) {
                    const container = document.getElementById('chatMsgs');
                    container.innerHTML = data.messages.map(m => {
                        const isMe = m.sender === user.phone;
                        return `
                            <div class="msg ${isMe ? 'sent' : 'received'}">
                                ${m.text}
                                <div class="msg-info">
                                    <span>${m.time || ''}</span>
                                    ${isMe ? '<i class="fas fa-check status-tick"></i>' : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                    container.scrollTop = container.scrollHeight;
                    lastMsgCount = data.messages.length;
                    
                    // لو الشات مفتوح وفي رسالة جديدة من الصديق، نلعب صوت
                    if (data.messages[data.messages.length-1].sender !== user.phone) playTone();
                }
            } catch(e) {}
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if(!text) return;
            const user = JSON.parse(localStorage.getItem('appUser'));
            
            // إضافة الرسالة فوراً في الشاشة مع علامة الساعة
            const container = document.getElementById('chatMsgs');
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg sent';
            tempDiv.innerHTML = `${text}<div class="msg-info"><span>الآن</span> <i class="fas fa-clock status-tick"></i></div>`;
            container.appendChild(tempDiv);
            container.scrollTop = container.scrollHeight;
            
            inp.value = '';

            try {
                await fetch(`${SCRIPT_URL}?action=sendMessage&sender=${user.phone}&receiver=${window.currentChatPhone}&text=${encodeURIComponent(text)}`);
                // التحديث الجاي من الـ Interval هيشيل الساعة ويحط الصح
            } catch(e) {
                tempDiv.style.background = "#8b0000";
                tempDiv.querySelector('.status-tick').className = "fas fa-exclamation-circle";
            }
        }

        function playTone() { try { new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play(); } catch(e) {} }

        function closeChat() {
            isChatOpen = false;
            document.getElementById('chatPage').style.display = 'none';
            clearInterval(chatInterval);
            window.currentChatPhone = null;
            fetchFriendsData();
        }

        function goToFriends() { showSection('friendsPage'); }

        async function searchFriend() {
            const p = document.getElementById('friendPhone').value;
            if(!p) return;
            Swal.showLoading();
            const res = await fetch(`${SCRIPT_URL}?action=search&phone=${p}`);
            const data = await res.json();
            Swal.close();
            if(data.found) {
                document.getElementById('searchResult').style.display = 'block';
                document.getElementById('foundName').innerText = data.name;
                window.searchedPhone = p;
            } else {
                Swal.fire('غير موجود', 'الرقم غير مسجل', 'info');
            }
        }

        async function sendFriendRequest() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=request&from=${user.phone}&to=${window.searchedPhone}`);
            Swal.fire('تم', 'أرسلنا طلب الصداقة!', 'success');
            document.getElementById('searchResult').style.display = 'none';
        }

        async function respond(phone, act) {
            const user = JSON.parse(localStorage.getItem('appUser'));
            await fetch(`${SCRIPT_URL}?action=respond&me=${user.phone}&friend=${phone}&act=${act}`);
            fetchFriendsData();
        }

        initApp();
    </script>
</body>
</html>
