<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة بطيختي 🍉 - النسخة النهائية</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #0f121d; --card-bg: #1a1f2e; --accent: #2ed573; --primary: #764ba2; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--main-bg); color: var(--text); margin: 0; padding-bottom: 30px; overflow-x: hidden; }

        .top-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #161a26; position: sticky; top: 0; z-index: 1000; }
        .nav-icons { display: flex; gap: 12px; align-items: center; }
        .icon-circle { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent); position: relative; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ff4757; color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #161a26; }
        
        /* إشعار الرسائل الجديد */
        .msg-toast { position: fixed; top: 70px; left: 15px; right: 15px; background: var(--primary); padding: 12px; border-radius: 12px; display: none; align-items: center; gap: 12px; z-index: 3000; animation: slideDown 0.5s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .back-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--accent); cursor: pointer; font-weight: bold; }
        
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .tool-card { background: var(--card-bg); padding: 25px; border-radius: 22px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .tool-card i { font-size: 30px; color: var(--accent); margin-bottom: 12px; display: block; }
        .challenge-card { background: linear-gradient(45deg, #f093fb, #f5576c); grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px; }

        .advice-section { margin: 20px 10px; background: linear-gradient(135deg, #2c3e50, #000000); padding: 20px; border-radius: 25px; border: 1px solid rgba(46, 213, 115, 0.3); position: relative; overflow: hidden; }
        .advice-title { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .advice-text { font-size: 15px; line-height: 1.6; color: #eee; }

        .profile-card { background: var(--card-bg); border-radius: 30px; padding: 25px; text-align: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .profile-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 80px; background: linear-gradient(45deg, var(--primary), var(--accent)); z-index: 0; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--card-bg); position: relative; z-index: 1; margin-top: 10px; background: #2a3245; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-num { font-size: 18px; font-weight: bold; color: var(--accent); display: block; }

        .timer-full-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; }
        .timer-container { position: relative; width: 260px; height: 260px; margin: 10px auto; }
        .timer-svg { transform: rotate(-90deg); width: 260px; height: 260px; }
        .timer-circle-bg { fill: none; stroke: #2a3245; stroke-width: 10; }
        .timer-circle-progress { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 816; stroke-dashoffset: 816; transition: 0.3s; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: bold; font-family: monospace; }
        .time-selector { display: flex; gap: 8px; margin-bottom: 25px; }
        .time-btn { background: #161a26; border: 1px solid #2a3245; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .time-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .task-item { background: var(--card-bg); padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--accent); }
        .player-bar { position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--primary); padding: 10px 15px; border-radius: 15px; display: none; align-items: center; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .player-bar audio { flex: 1; height: 30px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="cheerSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="msgToast" class="msg-toast" onclick="window.location.href='chel.html'">
        <i class="fas fa-comment-dots"></i>
        <span>لديك رسالة جديدة في الساحة! 💬</span>
    </div>

    <div class="top-nav">
        <h3 onclick="goHome()" style="cursor:pointer; margin:0;">بطيختي 🍉</h3>
        <div class="nav-icons">
            <div class="icon-circle" onclick="openPage('notifPage')"><i class="fas fa-bell"></i><span class="badge" id="notifBadge">0</span></div>
            <div class="icon-circle" onclick="openPage('profilePage')"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <div id="homePage" class="page active-page">
        <div class="tools-grid">
            <div class="tool-card challenge-card" onclick="window.location.href='chel.html'">
                <i class="fas fa-trophy" style="margin:0; color:white;"></i>
                <h3 style="margin:0;">تحدي الأصدقاء 🔥</h3>
            </div>
            <div class="tool-card" onclick="openPage('subjectsPage')"><i class="fas fa-play-circle"></i><h4>المواد</h4></div>
            <div class="tool-card" onclick="openPage('quranPage')"><i class="fas fa-quran"></i><h4>القرآن</h4></div>
            <div class="tool-card" onclick="openPage('tasksPage')"><i class="fas fa-check-circle"></i><h4>المهام</h4></div>
            <div class="tool-card" onclick="openPage('timerPage')"><i class="fas fa-stopwatch"></i><h4>العداد</h4></div>
        </div>
        <div class="advice-section">
            <div class="advice-title"><i class="fas fa-lightbulb"></i> نصيحة اليوم للبطيخة الشاطرة</div>
            <div class="advice-text" id="dailyAdvice">حمل النصيحة...</div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div>
        <div class="profile-card">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="profile-img">
            <h2 id="pName">--</h2>
            <p id="pYearText">--</p>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-num" id="statDone">0</span><span>إنجاز دائم</span></div>
                <div class="stat-box"><span class="stat-num" id="statPoints">0</span><span>نقاطي الكلية</span></div>
            </div>
            <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:15px; width:100%; border-radius:15px; margin-top:20px; font-weight:bold; cursor:pointer;">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "Https://script.google.com/macros/s/AKfycbwzlFyxJTsGDQd0AdsXI5efJyOe14_o6dSVo4rSclMyE8TBLYa8_cIfV3sJZhagAW6-/exec";
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let totalFinishedCount = parseInt(localStorage.getItem('totalFinishedCount')) || 0;

        // دالة التنقل الذكي مع الحفاظ على الصفحة
        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            
            // حفظ الصفحة الحالية في المتصفح
            localStorage.setItem('currentPage', id);

            if(id === 'profilePage') loadProfileData();
            if(id === 'tasksPage') loadT();
            if(id === 'subjectsPage') loadS();
            if(id === 'quranPage') loadQ();
            if(id === 'notifPage') loadNotifs();
            updateBadge();
        }

        // عند فتح الصفحة لأول مرة أو عمل Refresh
        window.onload = () => {
            const savedPage = localStorage.getItem('currentPage');
            if (savedPage) {
                openPage(savedPage);
            } else {
                goHome();
            }
            setDailyAdvice();
            updateBadge();
            updateCircle();
            checkNewMessages(); // بدء فحص الرسائل
            setInterval(checkNewMessages, 5000); // كل 5 ثواني
        };

        async function checkNewMessages() {
            const user = JSON.parse(localStorage.getItem('appUser'));
            if (!user) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getFriends&phone=${user.phone}`);
                const data = await res.json();
                // إذا كان هناك طلبات معلقة (Received) نظهر إشعار
                if (data.received && data.received.length > 0) {
                    document.getElementById('msgToast').style.display = 'flex';
                    setTimeout(() => { document.getElementById('msgToast').style.display = 'none'; }, 4000);
                }
            } catch(e) {}
        }

        function goHome() { openPage('homePage'); }

        // --- بقية الدوال الأصلية الخاصة بك (Advice, Timer, Tasks, etc.) ---
        // (انسخ الدوال الأصلية بالكامل من كودك القديم وضعها هنا)
        const advices = ["ابدأ يومك بصلاة الفجر، بركة اليوم تبدأ من هناك.", "المذاكرة لمدة 25 دقيقة بتركيز أفضل من 4 ساعات تشتت.", "لا تؤجل عمل اليوم إلى الغد، البطيخة الشاطرة تنجز أولاً بأول.", "اجعل لنفسك ورداً يومياً من القرآن، فإنه ينير العقل.", "تذكر دائماً فرحة أهلك يوم النتيجة، تستحق التعب!"];
        function setDailyAdvice() {
            const date = new Date().toDateString();
            let hash = 0; for (let i = 0; i < date.length; i++) { hash = date.charCodeAt(i) + ((hash << 5) - hash); }
            document.getElementById('dailyAdvice').innerText = advices[Math.abs(hash) % advices.length];
        }
        function getStudentData() { return JSON.parse(localStorage.getItem('activeStudent')) || { name: "طالب بطيخة", year: "3", branch: "علمي علوم" }; }
        function getYearName(y) { return {"1": "الأول", "2": "الثاني", "3": "الثالث"}[String(y)] || y; }
        function loadProfileData() {
            const user = getStudentData();
            document.getElementById('pName').innerText = user.name;
            document.getElementById('pYearText').innerText = `الصف ${getYearName(user.year)} ثانوي - ${user.branch}`;
            document.getElementById('statDone').innerText = totalFinishedCount;
            document.getElementById('statPoints').innerText = totalFinishedCount * 10;
        }

        // ... (أكمل بقية الدوال: Timer Logic, Tasks, Subjects, Quran, Logout)
    </script>
</body>
</html>
