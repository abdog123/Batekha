<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة بطيختي 🍉 - النسخة المطورة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #0f121d; --card-bg: #1a1f2e; --accent: #2ed573; --primary: #764ba2; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--main-bg); color: var(--text); margin: 0; padding-bottom: 30px; overflow-x: hidden; }

        /* الأزرار الحية */
        button:active, .tool-card:active { transform: scale(0.95); opacity: 0.9; }

        .top-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #161a26; position: sticky; top: 0; z-index: 1000; }
        .nav-icons { display: flex; gap: 12px; align-items: center; }
        .icon-circle { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent); position: relative; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ff4757; color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #161a26; }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        .back-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--accent); cursor: pointer; font-weight: bold; }
        
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .tool-card { background: var(--card-bg); padding: 25px; border-radius: 22px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .tool-card i { font-size: 30px; color: var(--accent); margin-bottom: 12px; display: block; }
        
        /* زر التحدي المطور */
        .challenge-card { 
            background: linear-gradient(45deg, #764ba2, #2ed573); 
            grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 20px;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.2);
        }

        .advice-section { margin: 20px 10px; background: linear-gradient(135deg, #2c3e50, #000000); padding: 20px; border-radius: 25px; border: 1px solid rgba(46, 213, 115, 0.3); }
        .advice-title { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .advice-text { font-size: 15px; line-height: 1.6; color: #eee; }

        /* الملف الشخصي */
        .profile-card { background: var(--card-bg); border-radius: 30px; padding: 25px; text-align: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .profile-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 80px; background: linear-gradient(45deg, var(--primary), var(--accent)); z-index: 0; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--card-bg); position: relative; z-index: 1; margin-top: 10px; background: #2a3245; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-num { font-size: 18px; font-weight: bold; color: var(--accent); display: block; }

        /* العداد */
        .timer-full-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; }
        .timer-container { position: relative; width: 260px; height: 260px; margin: 10px auto; }
        .timer-svg { transform: rotate(-90deg); width: 260px; height: 260px; }
        .timer-circle-bg { fill: none; stroke: #2a3245; stroke-width: 10; }
        .timer-circle-progress { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 816; stroke-dashoffset: 816; transition: 0.3s; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: bold; font-family: monospace; }
        .time-selector { display: flex; gap: 8px; margin-bottom: 25px; }
        .time-btn { background: #161a26; border: 1px solid #2a3245; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .task-item { background: var(--card-bg); padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--accent); }
        .player-bar { position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--primary); padding: 10px 15px; border-radius: 15px; display: none; align-items: center; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="cheerSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div class="top-nav">
        <h3 onclick="goHome()" style="cursor:pointer; margin:0;">بطيختي 🍉</h3>
        <div class="nav-icons">
            <div class="icon-circle" onclick="openPage('notifPage')"><i class="fas fa-bell"></i><span class="badge" id="notifBadge">0</span></div>
            <div class="icon-circle" onclick="openPage('profilePage')"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <div id="homePage" class="page active-page">
        <div class="tools-grid">
            <div class="tool-card challenge-card" onclick="window.location.href='Chel.html'">
                <i class="fas fa-comments" style="margin:0; color:white;"></i>
                <h3 style="margin:0; color:white;">ساحة الأصدقاء والشات 🔥</h3>
            </div>
            <div class="tool-card" onclick="openPage('subjectsPage')"><i class="fas fa-play-circle"></i><h4>المواد</h4></div>
            <div class="tool-card" onclick="openPage('quranPage')"><i class="fas fa-quran"></i><h4>القرآن</h4></div>
            <div class="tool-card" onclick="openPage('tasksPage')"><i class="fas fa-check-circle"></i><h4>المهام</h4></div>
            <div class="tool-card" onclick="openPage('timerPage')"><i class="fas fa-stopwatch"></i><h4>العداد</h4></div>
        </div>
        <div class="advice-section">
            <div class="advice-title"><i class="fas fa-lightbulb"></i> نصيحة اليوم للبطيخة الشاطرة</div>
            <div class="advice-text" id="dailyAdvice">حمل النصيحة...</div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div>
        <div class="profile-card">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="profile-img">
            <h2 id="pName">--</h2>
            <p id="pYearText">--</p>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-num" id="statDone">0</span><span>إنجاز دائم</span></div>
                <div class="stat-box"><span class="stat-num" id="statPoints">0</span><span>نقاطي الكلية</span></div>
            </div>
            <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:15px; width:100%; border-radius:15px; margin-top:20px; font-weight:bold; cursor:pointer;">تسجيل الخروج</button>
        </div>
    </div>

    <div id="timerPage" class="page">
        <div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div>
        <div class="timer-full-page">
            <div class="time-selector">
                <button class="time-btn" onclick="setTimer(15)">15د</button>
                <button class="time-btn active" id="btn25" onclick="setTimer(25)">25د</button>
                <button class="time-btn" onclick="setTimer(45)">45د</button>
                <button class="time-btn" onclick="setTimer(60)">60د</button>
            </div>
            <div class="timer-container">
                <svg class="timer-svg">
                    <circle class="timer-circle-bg" cx="130" cy="130" r="125"></circle>
                    <circle id="progressCircle" class="timer-circle-progress" cx="130" cy="130" r="125"></circle>
                </svg>
                <div class="timer-text" id="tDisplay">25:00</div>
            </div>
            <div style="text-align:center; display: flex; justify-content: center; gap: 15px; margin-top: 25px;">
                <button id="tBtn" onclick="toggleT()" style="background:var(--accent); border:none; padding:18px 60px; border-radius:18px; font-weight:bold; color:#000; font-size:18px;">بدء</button>
                <button onclick="resetT()" style="background:#ff4757; border:none; padding:18px; border-radius:18px; color: white;"><i class="fas fa-redo"></i></button>
            </div>
        </div>
    </div>

    <div id="tasksPage" class="page">
        <div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="tInput" style="flex:1; padding:15px; border-radius:15px; background:#161a26; border:1px solid #2a3245; color:white;" placeholder="مهمة جديدة؟">
            <button onclick="addTask()" style="background:var(--accent); border:none; padding:15px 25px; border-radius:15px;"><i class="fas fa-plus"></i></button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="subjectsPage" class="page"><div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div><div id="sGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div></div>
    <div id="quranPage" class="page"><div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div><div id="quranList"></div></div>
    <div id="notifPage" class="page"><div class="back-header" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</div><div id="notifContent"></div></div>

    <div id="playerBar" class="player-bar">
        <audio id="mainAudio" controls></audio>
        <i class="fas fa-times" onclick="stopAudio()" style="margin-right:10px; cursor:pointer; color:#fff;"></i>
    </div>

    <script>
        // دمج المنطق البرمجي
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let totalFinishedCount = parseInt(localStorage.getItem('totalFinishedCount')) || 0;
        const activeUser = JSON.parse(localStorage.getItem('activeStudent'));

        // توجيه المستخدم إذا لم يسجل دخوله
        if (!activeUser) window.location.href = 'index.html';

        function goHome() { openPage('homePage'); localStorage.setItem('lastDashPage', 'homePage'); }

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            localStorage.setItem('lastDashPage', id);
            if(id === 'profilePage') loadProfileData();
            if(id === 'tasksPage') loadT();
            if(id === 'subjectsPage') loadS();
            if(id === 'quranPage') loadQ();
            if(id === 'notifPage') loadNotifs();
            updateBadge();
        }

        // حفظ الصفحة الأخيرة عند العودة
        window.onload = () => {
            const last = localStorage.getItem('lastDashPage') || 'homePage';
            openPage(last);
            setDailyAdvice();
        };

        // --- نظام المهام (نفس كودك مع تحسين الحفظ) ---
        function loadT() {
            document.getElementById('tList').innerHTML = tasks.map((t, i) => `
                <div class="task-item" style="${t.done ? 'opacity:0.5' : ''}">
                    <span style="${t.done ? 'text-decoration:line-through' : ''}">${t.text}</span>
                    <div>
                        ${!t.done ? `<i class="fas fa-check-circle" onclick="confirmDone(${i})" style="color:var(--accent); cursor:pointer;"></i>` : ''}
                        <i class="fas fa-trash" onclick="deleteTask(${i})" style="color:#ff4757; cursor:pointer; margin-right:10px;"></i>
                    </div>
                </div>
            `).join('');
        }

        function confirmDone(i) {
            Swal.fire({ title: 'خلصت المهمة؟ 🍉', text: "سيتم إضافة 10 نقاط لرصيدك الدائم", icon: 'question', showCancelButton: true, confirmButtonText: 'نعم، تم!' }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('cheerSound').play();
                    tasks[i].done = true; totalFinishedCount++;
                    localStorage.setItem('totalFinishedCount', totalFinishedCount);
                    saveT(); loadT();
                }
            });
        }

        function addTask() {
            const inp = document.getElementById('tInput'); if(!inp.value) return;
            tasks.push({text: inp.value, done: false}); saveT(); inp.value = ""; loadT();
        }
        function deleteTask(i) { tasks.splice(i, 1); saveT(); loadT(); }
        function saveT() { localStorage.setItem('tasks', JSON.stringify(tasks)); updateBadge(); }

        // --- العداد والقرآن والمواد (نفس منطق كودك الأصلي) ---
        let timeLeft = 1500, totalTime = 1500, timerInterval = null;
        const circumference = 2 * Math.PI * 125;
        document.getElementById('progressCircle').style.strokeDasharray = circumference;

        function setTimer(mins) {
            timeLeft = mins * 60; totalTime = timeLeft;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
            updateUI(); updateCircle();
        }
        function toggleT() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('tBtn').innerText = "استكمال"; }
            else {
                timerInterval = setInterval(() => {
                    timeLeft--; updateUI(); updateCircle();
                    if(timeLeft <= 0) { 
                        clearInterval(timerInterval); timerInterval = null;
                        document.getElementById('notifSound').play();
                        Swal.fire('انتهى الوقت! 🎉'); resetT();
                    }
                }, 1000); document.getElementById('tBtn').innerText = "إيقاف";
            }
        }
        function updateUI() { const m = Math.floor(timeLeft/60), s = timeLeft%60; document.getElementById('tDisplay').innerText = `${m}:${s < 10 ? '0'+s : s}`; }
        function updateCircle() { const offset = circumference - ((totalTime - timeLeft) / totalTime) * circumference; document.getElementById('progressCircle').style.strokeDashoffset = offset; }
        function resetT() { clearInterval(timerInterval); timerInterval = null; timeLeft = totalTime; updateUI(); updateCircle(); document.getElementById('tBtn').innerText = "بدء"; }

        function loadProfileData() {
            document.getElementById('pName').innerText = activeUser.name;
            document.getElementById('pYearText').innerText = `الصف ${activeUser.year} ثانوي - ${activeUser.branch}`;
            document.getElementById('statDone').innerText = totalFinishedCount;
            document.getElementById('statPoints').innerText = totalFinishedCount * 10;
        }

        function updateBadge() {
            const count = tasks.filter(t => !t.done).length;
            const b = document.getElementById('notifBadge');
            b.innerText = count; b.style.display = count > 0 ? 'flex' : 'none';
        }

        function logout() { localStorage.removeItem('activeStudent'); window.location.href = 'index.html'; }

        // نصيحة اليوم
        const advices = ["المذاكرة بتركيز أفضل من ساعات طويلة بدون نفع.", "ابدأ بأصعب مادة وأنت في كامل نشاطك.", "القرآن يفتح لك أبواب الفهم، لا تهجره."];
        function setDailyAdvice() { document.getElementById('dailyAdvice').innerText = advices[Math.floor(Math.random()*advices.length)]; }

        // تشغيل القرآن والمواد (دوال مكملة من كودك)
        async function loadQ() {
            const list = document.getElementById('quranList'); if(list.innerHTML !== "") return;
            const res = await fetch('https://api.alquran.cloud/v1/surah'); const data = await res.json();
            list.innerHTML = data.data.map(s => `<div class="task-item" onclick="playSurah(${s.number})"><span>${s.name}</span><i class="fas fa-play-circle" style="color:var(--accent)"></i></div>`).join('');
        }
        function playSurah(id) {
            const bar = document.getElementById('playerBar'); const audio = document.getElementById('mainAudio');
            audio.src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
            bar.style.display = 'flex'; audio.play();
        }
        function stopAudio() { document.getElementById('mainAudio').pause(); document.getElementById('playerBar').style.display = 'none'; }
    </script>
</body>
</html>
